name: Quellen-Schema erzeugen

on:
  push:
    branches:
      - main
    paths:
      - "**/10-quellenverzeichnis.md"
      - "scripts/build_quellen_schema.py"
      - ".github/workflows/build-quellen-schema.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Quellenverzeichnis finden
        id: source
        shell: bash
        run: |
          mapfile -t files < <(find . -type f -name '10-quellenverzeichnis.md' -not -path './.git/*')

          if [ "${#files[@]}" -ne 1 ]; then
            echo "Erwartet wurde genau eine Datei 10-quellenverzeichnis.md, gefunden: ${#files[@]}" >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi

          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: JSON-LD erzeugen
        run: |
          python scripts/build_quellen_schema.py \
            "${{ steps.source.outputs.path }}" \
            "schema/generated/quellenverzeichnis.json" \
            --report "schema/generated/quellenverzeichnis-report.json" \
            --page-url "https://www.oliver-nix.de/sport/trainingsphysiologische-datenbasis-ausdauersport/quellenverzeichnis/" \
            --disclaimer-url "https://www.oliver-nix.de/sport/trainingsphysiologische-datenbasis-ausdauersport/disclaimer/"

      - name: JSON syntaktisch prüfen
        run: python -m json.tool schema/generated/quellenverzeichnis.json > /dev/null

      - name: Änderungen committen
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            schema/generated/quellenverzeichnis.json \
            schema/generated/quellenverzeichnis-report.json

          if git diff --cached --quiet; then
            echo "Keine Änderungen am generierten Schema."
            exit 0
          fi

          git commit -m "chore(schema): Quellenverzeichnis aktualisieren"
          git push
