name: CI/CD Content Optimization Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Codebasis auschecken
        uses: actions/checkout@v4

      - name: Python-Umgebung initialisieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Python-Abhaengigkeiten installieren
        run: pip install pyyaml ruamel.yaml

      - name: "Pipeline 1: Master-Quellenverzeichnis extrahieren"
        run: python .github/scripts/build_quellen.py

      - name: "Pipeline 2: JSON-LD in Typemill-YAML schreiben"
        run: python .github/scripts/build-jsonld.py

      - name: Ergebnisse im Main-Branch sichern
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --quiet && git diff --staged --quiet || git commit -m "System-Update: Quellenverzeichnis und JSON-LD aktualisiert"
          git push
