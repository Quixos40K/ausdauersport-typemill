name: JSON-Dateien fuer Markdown anlegen

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - "scripts/create-json-placeholders.sh"
      - ".github/workflows/create-json-placeholders.yml"

permissions:
  contents: write

jobs:
  create-json-files:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Fehlende JSON-Dateien anlegen
        run: bash scripts/create-json-placeholders.sh content

      - name: Aenderungen committen
        shell: bash
        run: |
          if git diff --quiet -- content; then
            echo "Keine neuen JSON-Dateien erforderlich."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all content
          git commit -m "Add JSON placeholders for Markdown files"
          git push
