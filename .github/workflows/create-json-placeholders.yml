name: Create JSON placeholders

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - "scripts/create-json-placeholders.sh"
      - ".github/workflows/create-json-placeholders.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-json-placeholders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create missing JSON files
        run: bash scripts/create-json-placeholders.sh content

      - name: Commit changes
        if: ${{ steps.create-json-files.outcome == 'success' }}
        run: |
          if git diff --quiet -- content; then
            echo "No new JSON files needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all content
          git commit -m "Add JSON placeholders for Markdown files"
          git push
