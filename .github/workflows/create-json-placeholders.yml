name: Create JSON placeholders

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'content/**/*.md'
      - 'scripts/create-json-placeholders.sh'
      - '.github/workflows/create-json-placeholders.yml'

permissions:
  contents: write

jobs:
  create-json-placeholders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create missing JSON files
        run: bash scripts/create-json-placeholders.sh content

      - name: Commit generated JSON files
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- content)" ]]; then
            echo "No new JSON files required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all content
          git commit -m "Add JSON placeholders for Markdown files"
          git push origin "HEAD:${GITHUB_REF_NAME}"
