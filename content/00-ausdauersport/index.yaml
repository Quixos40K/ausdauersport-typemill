    title: 'Ausdauersport: Faszination, Struktur und Wissenschaft'
    description: 'Ausdauersport ist meine absolute Leidenschaft, ein langfristiges Projekt und ein Thema, das mich immer wieder neugierig macht. Ich bin kein Elite-Athlet, der um irgendwelche Titel kämpft, sondern bestenfalls ein Hobbysportler mit ganz normalen Grenzen, mit guten und schlechten Trainingstagen und mit dem Wunsch, meinen Sport besser zu verstehen.'
