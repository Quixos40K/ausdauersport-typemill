    navtitle: 'Knochenremodellierung und Stressfrakturen'
    title: 'Knochenremodellierung und Stressfrakturen'
    description: 'Knochenremodellierung beschreibt, wie Knochengewebe fortlaufend abgebaut, erneuert und an mechanische Belastung angepasst wird. Im Ausdauersport ist das wichtig, weil Knochen regelmäßige Belastung brauchen, aber bei zu schneller oder zu einseitiger Belastungssteigerung überfordert werden können. Stressfrakturen entstehen meist nicht plötzlich, sondern als Folge wiederholter Mikrobelastungen, wenn Belastung und Regeneration nicht mehr zusammenpassen.'
