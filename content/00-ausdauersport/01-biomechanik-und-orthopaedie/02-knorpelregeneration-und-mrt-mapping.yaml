    navtitle: 'Knorpelregeneration und MRT Mapping'
    title: 'Knorpelregeneration und MRT Mapping'
    description: 'Knorpelregeneration und MRT-Mapping beschreiben, wie Gelenkknorpel auf mechanische Belastung reagiert und wie strukturelle Veränderungen bildgebend eingeordnet werden können. Im Ausdauersport ist das wichtig, weil Knorpel Druckbelastung braucht, aber nur langsam regeneriert. Entscheidend ist die Dosis: Regelmäßige, gut verträgliche Belastung kann den Knorpelstoffwechsel unterstützen, während abrupte oder monotone Überlastung Beschwerden begünstigen kann.'
