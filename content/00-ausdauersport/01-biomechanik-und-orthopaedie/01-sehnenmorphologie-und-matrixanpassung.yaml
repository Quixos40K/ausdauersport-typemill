    title: 'Sehnenmorphologie und Matrixanpassung'
    description: 'Sehnenmorphologie und Matrixanpassung beschreiben, wie sich Sehnenstruktur, Kollagenfasern und extrazelluläre Matrix an mechanische Belastung anpassen. Im Ausdauersport ist das wichtig, weil Sehnen Kraft übertragen, elastische Energie speichern und wiederholte Belastungen tolerieren müssen. Entscheidend ist: Sehnen passen sich langsamer an als Muskeln und Herz-Kreislauf-System.'
