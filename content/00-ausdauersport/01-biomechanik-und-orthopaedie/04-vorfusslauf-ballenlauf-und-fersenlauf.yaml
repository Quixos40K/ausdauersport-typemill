    title: 'Vorfußlauf, Ballenlauf und Fersenlauf'
    description: 'Vorfußlauf, Ballenlauf und Fersenlauf beschreiben, welcher Teil des Fußes beim Laufen zuerst den Boden berührt. Im Ausdauersport ist das wichtig, weil der Fußaufsatz beeinflusst, wie Kräfte auf Fuß, Sprunggelenk, Achillessehne, Knie und Hüfte verteilt werden. Entscheidend ist: Es gibt keinen grundsätzlich besten Laufstil. Ein Wechsel des Fußaufsatzes kann Belastungen verlagern und sollte nicht abrupt erfolgen.'
