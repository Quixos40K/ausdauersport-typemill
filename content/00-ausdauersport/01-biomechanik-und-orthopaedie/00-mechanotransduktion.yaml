    title: Mechanotransduktion
    description: 'Mechanotransduktion beschreibt, wie Zellen mechanische Reize in biologische Signale übersetzen. Im Ausdauersport ist das wichtig, weil Sehnen, Knochen, Knorpel, Muskeln und Bindegewebe nicht nur auf Stoffwechselreize reagieren, sondern auch auf Zug, Druck, Scherkräfte und wiederholte Belastung. Entscheidend ist die passende Dosierung: Mechanische Reize können Anpassung fördern, bei zu hoher oder zu monotoner Belastung aber auch Überlastung begünstigen.'
