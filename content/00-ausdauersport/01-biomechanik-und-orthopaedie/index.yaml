    title: 'Biomechanik und Orthopädie'
    description: 'Biomechanik und Orthopädie beschreibt, wie Bewegungen, Kräfte und Gewebestrukturen im Ausdauersport zusammenwirken. Gutes Lauftraining entsteht nicht nur durch Kondition und Trainingsplanung, sondern auch durch ein Verständnis dafür, wie Knochen, Sehnen, Knorpel, Gelenke und Lauftechnik auf wiederholte Belastung reagieren.'
