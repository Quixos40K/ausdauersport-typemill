    title: Laufökonomie
    description: 'Laufökonomie beschreibt, wie viel Energie oder Sauerstoff ein Läufer benötigt, um eine bestimmte Geschwindigkeit aufrechtzuerhalten. Im Ausdauersport ist das wichtig, weil zwei Läufer mit ähnlicher VO2max trotzdem unterschiedlich schnell oder lange laufen können. Entscheidend ist nicht nur der Motor, sondern wie effizient Kraft, Technik, Sehnenelastizität und neuromuskuläre Steuerung in Vortrieb umgesetzt werden.'
