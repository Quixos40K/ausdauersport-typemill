    title: 'Praxis und Mythen'
    description: 'Praxis und Mythen beschreibt, wie typische Annahmen, Trainingsregeln und verbreitete Aussagen im Ausdauersport eingeordnet werden können. Gutes Ausdauertraining entsteht nicht durch einfache Pauschalaussagen, sondern durch eine differenzierte Betrachtung von Kontext, Trainingsstand, Zielsetzung und individueller Belastbarkeit.'
