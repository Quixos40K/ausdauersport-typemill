              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Sind Supplemente im Ausdauersport sinnvoll?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, sie können sinnvoll sein, wenn ein konkreter Bedarf besteht. Beispiele sind Kohlenhydrate bei langen Belastungen, Elektrolyte bei Hitze oder Protein als praktische Ergänzung. Sie ersetzen aber keine solide Ernährung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ersetzen Supplemente keine Mahlzeiten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Mahlzeiten liefern Energie, Makronährstoffe, Mikronährstoffe, Ballaststoffe und viele weitere Nahrungsbestandteile zusammen. Supplemente liefern meist nur einzelne Bausteine."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist wichtiger als Supplemente?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wichtiger sind ausreichende Energiezufuhr, passende Kohlenhydrate, genug Protein, sinnvolle Flüssigkeitszufuhr, regelmäßige Mahlzeiten, Schlaf und eine passende Belastungssteuerung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man Vitamine und Mineralstoffe einfach vorsorglich nehmen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht pauschal. Bei Verdacht auf Mangel, besonderer Ernährungsform oder auffälligen Beschwerden ist eine gezielte Abklärung sinnvoller als blindes Supplementieren."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Können Gels und Sportgetränke sinnvoll sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, besonders bei langen oder intensiven Einheiten und im Wettkampf können Kohlenhydrate und Flüssigkeit praktisch sein. Sie sind aber eine Trainings- und Wettkampfstrategie, keine Ersatzernährung für den Alltag."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler bei Supplementen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Viele erwarten von Supplementen eine Abkürzung. Wenn Ernährung, Schlaf, Erholung und Trainingssteuerung nicht passen, kann ein Supplement diese Grundlage nicht ersetzen. ----"
                  }
                }
              ]
