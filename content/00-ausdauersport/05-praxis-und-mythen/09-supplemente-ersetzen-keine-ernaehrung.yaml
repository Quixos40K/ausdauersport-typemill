    navtitle: 'Supplemente ersetzen keine Ernährung'
    title: 'Supplemente ersetzen keine Ernährung'
    description: "Supplemente können im Ausdauersport sinnvoll sein, ersetzen aber keine gute Ernährung. Entscheidend bleiben ausreichende Energiezufuhr, Kohlenhydrate, Protein, Fette, Mikronährstoffe, Flüssigkeit und regelmäßige Mahlzeiten. Supplemente sind Ergänzungen für konkrete Situationen, nicht die Grundlage der Leistungsentwicklung.\n"
