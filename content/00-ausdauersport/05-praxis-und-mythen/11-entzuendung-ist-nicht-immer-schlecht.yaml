              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Ist Entzündung nach Training normal?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, eine leichte und vorübergehende Entzündungsreaktion kann nach Training normal sein. Sie kann Teil von Reparatur, Anpassung und Gewebeumbau sein."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann wird Entzündung problematisch?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Problematisch wird sie, wenn Beschwerden stark sind, länger anhalten, zunehmen oder mit Schwellung, Hinken, Krankheitsgefühl oder Leistungseinbruch verbunden sind."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man Entzündung immer unterdrücken?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht pauschal. Entzündung ist auch ein Signal für Reparatur und Anpassung. Ob Maßnahmen sinnvoll sind, hängt vom Kontext, den Beschwerden und der Ursache ab."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was hilft bei normaler Belastungsreaktion?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Oft helfen Schlaf, ausreichende Energiezufuhr, lockere Bewegung, reduzierte Belastung und Zeit. Entscheidend ist, dass die Reaktion abklingt und die Belastbarkeit wieder steigt."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Anpassung und Überlastung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei Anpassung klingt die Reaktion ab und der Körper wird belastbarer. Bei Überlastung bleiben Beschwerden bestehen, nehmen zu oder kehren bei ähnlicher Belastung immer wieder zurück."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Viele bewerten Entzündung entweder immer als schlecht oder ignorieren sie komplett. Sinnvoller ist die Einordnung: akut und kontrolliert kann sie hilfreich sein, anhaltend oder schmerzhaft kann sie ein Warnsignal sein. ----"
                  }
                }
              ]
            }
