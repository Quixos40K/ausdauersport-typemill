    title: 'Entzündung ist nicht immer schlecht'
    description: 'Entzündung ist nicht automatisch schlecht. Nach Training kann eine kontrollierte Entzündungsreaktion Teil von Reparatur, Anpassung und Gewebeumbau sein. Problematisch wird Entzündung vor allem dann, wenn sie zu stark, zu lange, wiederkehrend oder mit Schmerzen, Krankheitssymptomen und schlechter Erholung verbunden ist.'
