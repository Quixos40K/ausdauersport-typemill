              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Macht Krafttraining Läufer langsamer?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein, nicht automatisch. Richtig dosiertes Krafttraining kann Läufer stabiler, belastbarer und ökonomischer machen. Problematisch wird es eher, wenn Krafttraining zu viel Ermüdung erzeugt oder schlecht in den Laufplan eingebaut wird."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bauen Läufer durch Krafttraining zu viel Muskelmasse auf?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei sinnvoller Dosierung passiert das nicht automatisch. Krafttraining für Läufer zielt meist nicht auf maximale Muskelmasse, sondern auf Kraft, Stabilität, Kontrolle und Belastbarkeit."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Vorteile hat Krafttraining für Läufer?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Krafttraining kann Rumpfstabilität, Hüftkontrolle, Beinachse, Wadenkraft, Sehnenbelastbarkeit und Laufökonomie unterstützen. Es kann außerdem helfen, Belastungen besser zu tolerieren."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie oft sollten Läufer Krafttraining machen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt von Trainingsstand, Ziel und Gesamtbelastung ab. Für viele Läufer sind ein bis zwei gut geplante Einheiten pro Woche ein sinnvoller Einstieg. Entscheidend ist, dass die Laufeinheiten nicht dauerhaft darunter leiden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann sollte Krafttraining in die Woche passen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Krafttraining sollte so platziert werden, dass wichtige Laufeinheiten nicht unnötig beeinträchtigt werden. Häufig passt es nach lockeren Läufen, an separaten Tagen oder in Phasen mit weniger Laufintensität."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler beim Krafttraining für Läufer?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Viele machen zu viel auf einmal. Neue Übungen, hohe Lasten und starker Muskelkater können die Laufqualität kurzfristig verschlechtern. Besser ist ein ruhiger Aufbau mit sauberer Technik. ----"
                  }
                }
              ]
