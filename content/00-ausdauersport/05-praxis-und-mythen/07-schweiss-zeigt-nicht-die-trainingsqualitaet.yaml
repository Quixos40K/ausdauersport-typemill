    navtitle: 'Schweiß zeigt nicht die Trainingsqualität'
    title: 'Schweiß zeigt nicht die Trainingsqualität'
    description: "Schweiß zeigt nicht automatisch, wie gut ein Training war. Schwitzen ist vor allem ein Mechanismus zur Temperaturregulation. Wie viel jemand schwitzt, hängt unter anderem von Hitze, Luftfeuchtigkeit, Kleidung, Trainingszustand, Genetik, Körpergröße und Gewöhnung an Wärme ab. Die Trainingsqualität erkennt man besser an Ziel, Intensität, Belastungssteuerung, Technik, Erholung und langfristiger Entwicklung.\n"
