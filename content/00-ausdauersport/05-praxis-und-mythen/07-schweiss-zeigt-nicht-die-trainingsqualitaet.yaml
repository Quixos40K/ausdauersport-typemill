              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Bedeutet viel Schweiß ein gutes Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Viel Schweiß zeigt vor allem, dass der Körper Wärme reguliert. Ob das Training gut war, hängt stärker von Ziel, Intensität, Belastungssteuerung und Erholung ab."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Verbrennt man mehr Fett, wenn man mehr schwitzt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Schweiß ist vor allem Wasserverlust. Fettverbrennung hängt von Energiestoffwechsel, Intensität, Dauer, Ernährung und Gesamtbilanz ab."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum schwitze ich bei lockeren Läufen stark?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Hitze, Luftfeuchtigkeit, Kleidung, Körpergröße, Genetik, Stress oder Hitzegewöhnung können die Schweißmenge erhöhen. Ein lockerer Lauf kann dadurch sehr schweißtreibend wirken."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist wenig Schweiß ein Zeichen für schlechtes Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Bei kühlem Wetter, niedriger Intensität oder guter Belüftung kann ein sinnvolles Training wenig Schweiß erzeugen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann Schwitzen trotzdem wichtig für Läufer sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Viel Schwitzen kann Flüssigkeits- und Elektrolytverluste erhöhen. Besonders bei langen Läufen, Hitze und Wettkämpfen sollte das berücksichtigt werden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Woran erkenne ich Trainingsqualität besser?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Besser sind Zielerreichung, passende Intensität, stabile Technik, subjektives Belastungsempfinden, Herzfrequenz oder Pace im Kontext, Erholung und langfristige Entwicklung. ----"
                  }
                }
              ]
