    title: 'Laktat ist kein Abfallprodukt'
    description: 'Laktat ist kein nutzloses Abfallprodukt. Es entsteht bei der Energiebereitstellung, kann weiterverwendet werden und dient dem Körper als Energieträger, Transportform und Signalstoff. Im Ausdauersport ist Laktat deshalb nicht der Feind, sondern ein Hinweis darauf, wie stark der Stoffwechsel gerade arbeitet.'
