              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeutet Open Window einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Open Window beschreibt die Vorstellung, dass das Immunsystem nach harter Ausdauerbelastung vorübergehend anfälliger wird. Diese Erklärung ist aber zu einfach, weil Immunzellen und Immunfunktionen nicht nur abnehmen, sondern sich auch umverteilen und verändern können."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist das Immunsystem nach hartem Training geschwächt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Nach intensiver Belastung verändert sich die Immunaktivität. Ob daraus ein Problem entsteht, hängt von Erholung, Schlaf, Energiezufuhr, Stress, Exposition und Trainingszustand ab."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum werden manche Läufer nach Wettkämpfen krank?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das kann viele Gründe haben. Neben der Belastung spielen auch Reisen, Menschenmengen, Schlafmangel, Kälte, mentale Anspannung, Ernährung und Kontakt mit Erregern eine Rolle."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist besser als das Open-Window-Bild?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Besser ist die Vorstellung einer vorübergehenden Immunumverteilung. Das Immunsystem ist nach Belastung nicht einfach ausgeschaltet, sondern anders organisiert und mit Reparatur- und Regulationsprozessen beschäftigt."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man nach harten Einheiten besonders vorsichtig sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, aber ohne Panik. Sinnvoll sind ausreichend Essen und Trinken, Schlaf, warme Kleidung, reduzierte Zusatzbelastung und Aufmerksamkeit für frühe Krankheitssignale."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann sollte Training reduziert werden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wenn Krankheitsgefühl, Halsschmerzen, Fieber, ungewöhnliche Müdigkeit, deutlich erhöhter Ruhepuls oder Leistungseinbruch auftreten, sollte Belastung reduziert und bei Bedarf medizinisch abgeklärt werden. ----"
                  }
                }
