    title: 'Open Window ist zu einfach gedacht'
    description: 'Das Open-Window-Modell ist zu einfach gedacht. Nach langen oder sehr intensiven Belastungen verändert sich die Immunaktivität vorübergehend, aber das bedeutet nicht automatisch, dass das Immunsystem einfach „offen“ oder geschwächt ist. Häufig geht es eher um Umverteilung, Aktivierung, Erholung, Energieverfügbarkeit und Gesamtstress.'
