    title: 'Mehr Training ist nicht immer besser'
    description: 'Mehr Training führt nicht automatisch zu mehr Leistung. Ausdauer verbessert sich, wenn Belastung und Erholung zusammenpassen. Wer Umfang oder Intensität zu schnell erhöht, kann Anpassung blockieren, Ermüdung aufbauen und das Risiko für Beschwerden, Leistungsabfall oder Überlastung steigern.'
