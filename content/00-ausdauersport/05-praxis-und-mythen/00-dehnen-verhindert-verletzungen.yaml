              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Verhindert Dehnen Verletzungen beim Laufen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Dehnen kann Beweglichkeit und Körperwahrnehmung unterstützen, aber Verletzungen hängen meist stärker mit Belastungssteuerung, Kraft, Ermüdung, Technik und Erholung zusammen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Dehnen deshalb nutzlos?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Dehnen kann sinnvoll sein, wenn es gezielt eingesetzt wird. Es kann helfen, Beweglichkeit zu erhalten, Spannungsgefühl zu reduzieren oder bestimmte Bewegungen besser wahrzunehmen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man vor dem Laufen dehnen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Vor dem Laufen sind lockeres Einlaufen, Mobilisation und dynamische Aktivierung oft passender als langes statisches Dehnen. Statisches Dehnen eignet sich eher separat oder nach lockeren Einheiten, wenn es gut vertragen wird."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann zu viel Dehnen schaden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Zu aggressives oder schmerzhaftes Dehnen kann gereiztes Gewebe zusätzlich belasten. Dehnen sollte kontrolliert, ruhig und ohne starken Schmerz durchgeführt werden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was schützt besser vor Verletzungen als Dehnen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wichtiger sind ein sinnvoller Belastungsaufbau, ausreichend Erholung, Krafttraining, stabile Lauftechnik, Schlaf, passende Schuhe und rechtzeitiges Reagieren auf Warnsignale."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Für wen ist Dehnen besonders relevant?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Dehnen kann besonders relevant sein, wenn Beweglichkeit tatsächlich eingeschränkt ist oder bestimmte Bewegungen nicht sauber ausgeführt werden können. Es sollte dann gezielt eingesetzt und nicht pauschal als Pflichtprogramm verstanden werden. ----"
                  }
                }
              ]
            }
