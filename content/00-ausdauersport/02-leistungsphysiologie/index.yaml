    title: Leistungsphysiologie
    description: 'Leistungsphysiologie beschreibt, wie Herz, Kreislauf, Atmung, Sauerstoffaufnahme, Energiestoffwechsel, Zellprozesse und Nervensystem die Ausdauerleistung beeinflussen. Gutes Ausdauertraining entsteht nicht nur durch absolvierte Kilometer, sondern durch körperliche Anpassungen, die Belastung langfristig besser aufnehmen, verarbeiten und umsetzen können.'
