    title: Energiestoffwechsel
    description: 'Energiestoffwechsel beschreibt, wie der Körper aus gespeicherter oder zugeführter Energie nutzbare Bewegungsenergie gewinnt. Im Ausdauertraining ist das wichtig, weil jede Belastung Energie benötigt und unterschiedliche Intensitäten verschiedene Stoffwechselwege stärker beanspruchen. Entscheidend ist, dass Fettstoffwechsel, Kohlenhydratstoffwechsel und kurzfristige Energiesysteme immer zusammenarbeiten, aber je nach Belastung unterschiedlich stark beteiligt sind.'
