    title: 'Atmung und Sauerstoffaufnahme'
    description: 'Atmung und Sauerstoffaufnahme beschreiben, wie Sauerstoff aus der Umgebungsluft über Lunge, Blut und Herz-Kreislauf-System zu den arbeitenden Muskeln gelangt. Im Ausdauertraining ist das wichtig, weil die Sauerstoffversorgung eine zentrale Grundlage für aerobe Energieproduktion, Belastbarkeit und Leistungsfähigkeit ist. Entscheidend ist nicht nur, wie viel Luft eingeatmet wird, sondern wie gut Sauerstoff aufgenommen, transportiert und in der Muskulatur genutzt werden kann.'
