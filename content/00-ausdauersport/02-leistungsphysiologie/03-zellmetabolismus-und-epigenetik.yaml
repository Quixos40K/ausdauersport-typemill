    title: 'Zellmetabolismus und Epigenetik'
    description: 'Zellmetabolismus und Epigenetik beschreiben, wie Muskelzellen Energie verarbeiten und wie Trainingsreize die Aktivität bestimmter Gene beeinflussen können, ohne die DNA selbst zu verändern. Im Ausdauertraining ist das wichtig, weil Anpassungen nicht nur im Herzen, in der Lunge oder im Blut entstehen, sondern tief in der Zelle beginnen. Entscheidend ist: Training wirkt als wiederholtes Signal, auf das Zellen mit Stoffwechselanpassung, besserer Energieverwertung und veränderter Genregulation reagieren können.'
