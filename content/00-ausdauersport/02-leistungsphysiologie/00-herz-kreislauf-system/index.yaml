    title: Herz-Kreislauf-System
    description: 'Das Herz-Kreislauf-System beschreibt, wie Herz, Blutgefäße und Blutfluss die Ausdauerleistung ermöglichen. Gutes Ausdauertraining entsteht nicht nur durch eine hohe Herzfrequenz im Training, sondern durch langfristige Anpassungen, die Sauerstofftransport, Durchblutung und Belastbarkeit verbessern können.'
