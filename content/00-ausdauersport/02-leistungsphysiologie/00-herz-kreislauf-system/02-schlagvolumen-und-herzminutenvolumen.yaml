    title: 'Schlagvolumen und Herzminutenvolumen'
    description: 'Das Schlagvolumen beschreibt, wie viel Blut das Herz mit einem einzelnen Herzschlag auswirft. Das Herzminutenvolumen beschreibt, wie viel Blut pro Minute durch den Kreislauf gepumpt wird. Im Ausdauertraining ist das wichtig, weil nicht nur die Herzfrequenz entscheidet, sondern auch, wie effektiv jeder Herzschlag Blut, Sauerstoff und Nährstoffe transportiert.'
