              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist das Schlagvolumen einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das Schlagvolumen ist die Blutmenge, die das Herz mit einem einzelnen Herzschlag auswirft. Es zeigt, wie viel Blut pro Schlag in den Kreislauf gelangt. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist das Herzminutenvolumen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das Herzminutenvolumen beschreibt, wie viel Blut das Herz pro Minute durch den Körper pumpt. Es ergibt sich aus Schlagvolumen mal Herzfrequenz. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist das für Ausdauertraining wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ausdauertraining erhöht den Sauerstoffbedarf der Muskulatur. Schlagvolumen und Herzminutenvolumen erklären, wie das Herz diesen Bedarf über Blutfluss und Sauerstofftransport abdeckt. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist eine niedrige Herzfrequenz immer besser?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Eine niedrige Herzfrequenz kann auf gute Ausdaueranpassung hinweisen, ist aber nicht automatisch ein Qualitätsmerkmal. Sie muss immer im Zusammenhang mit Leistung, Wohlbefinden, Erholung und möglichen Symptomen betrachtet werden. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum steigt die Herzfrequenz bei gleicher Pace manchmal an?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das kann durch Herzfrequenzdrift, Hitze, Flüssigkeitsverlust, Ermüdung, Stress oder unvollständige Erholung entstehen. Die äußere Belastung bleibt gleich, aber die innere Kreislaufbelastung steigt. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der wichtigste Unterschied zwischen Herzfrequenz und Herzminutenvolumen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Die Herzfrequenz beschreibt nur, wie oft das Herz schlägt. Das Herzminutenvolumen beschreibt, wie viel Blut pro Minute tatsächlich transportiert wird. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5) ----"
                  }
                }
              ]
