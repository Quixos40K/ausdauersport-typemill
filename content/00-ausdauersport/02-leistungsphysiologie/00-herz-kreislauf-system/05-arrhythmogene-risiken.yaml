              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was sind arrhythmogene Risiken einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Arrhythmogene Risiken sind Faktoren, die Herzrhythmusstörungen begünstigen können. Dazu gehören zum Beispiel strukturelle Veränderungen des Herzmuskels, Entzündungen, Elektrolytverschiebungen, genetische Faktoren oder Belastungssituationen mit hoher sympathischer Aktivierung. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Ausdauertraining schlecht für den Herzrhythmus?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Regelmäßiges Ausdauertraining wirkt in vielen Fällen herzschützend. Bei sehr hohen Umfängen, bestimmten Vorerkrankungen, Infekten oder strukturellen Auffälligkeiten muss das Risiko aber differenzierter eingeordnet werden. [[1]](quelle-1) [[2]](quelle-2) [[6]](quelle-6) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Trigger und Substrat?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Trigger ist der Auslöser, zum Beispiel intensive Belastung, Hitze oder Stress. Ein Substrat ist die Grundlage, die eine Rhythmusstörung begünstigen kann, zum Beispiel Narbengewebe, Myokarditis oder myokardiale Fibrose. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Warnzeichen sollten Läufer ernst nehmen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Brustschmerz, Brustdruck, Ohnmacht, Schwindel unter Belastung, ungeklärte Luftnot, anhaltendes Herzrasen, auffälliges Herzstolpern oder plötzlicher Leistungseinbruch sollten medizinisch abgeklärt werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Training mit Infekt problematisch?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Infekt kann den Körper systemisch belasten. Wenn das Herz mitbetroffen ist oder eine Entzündung vorliegt, kann Training das Risiko erhöhen. Besonders bei Fieber, Brustbeschwerden, Herzstolpern oder deutlichem Krankheitsgefühl sollte nicht trainiert werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Können Wearables Rhythmusstörungen sicher erkennen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wearables können Hinweise liefern, ersetzen aber keine medizinische Diagnostik. Auffällige Werte sollten im Zusammenhang mit Symptomen, Belastung und professioneller Untersuchung eingeordnet werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) ----"
                  }
                }
              ]
