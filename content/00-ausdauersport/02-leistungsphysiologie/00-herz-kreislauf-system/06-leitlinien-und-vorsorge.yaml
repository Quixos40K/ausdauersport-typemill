              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeuten Leitlinien im Sport einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Leitlinien sind fachliche Orientierungshilfen. Sie helfen dabei, Beschwerden, Risiken, Untersuchungen und sportliche Belastung nachvollziehbar einzuordnen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Vorsorge für Läufer wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Laufen fordert das Herz-Kreislauf-System regelmäßig. Vorsorge kann helfen, Risikofaktoren, Warnzeichen oder unklare Beschwerden frühzeitig zu erkennen und Training besser einzuordnen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wer sollte vor dem Training besonders auf Vorsorge achten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Besonders relevant ist Vorsorge für Wiedereinsteiger, ältere Sportler, Personen mit bekannten Risikofaktoren, familiärer Vorbelastung, Vorerkrankungen oder Beschwerden unter Belastung. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Warnzeichen sollte man ernst nehmen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Brustdruck, Brustschmerz, Ohnmacht, Schwindel unter Belastung, ungeklärte Luftnot, Herzrasen, anhaltendes Herzstolpern oder plötzlicher Leistungseinbruch sollten medizinisch abgeklärt werden. [[1]](quelle-1) [[2]](quelle-2) [[7]](quelle-7) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Reicht eine Sportuhr zur Vorsorge aus?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Wearables können Hinweise liefern, ersetzen aber keine medizinische Untersuchung. Auffällige Werte sollten immer im Zusammenhang mit Symptomen und Belastung bewertet werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bedeutet Vorsorge, dass man weniger trainieren muss?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Vorsorge soll helfen, Training sicherer und langfristiger zu gestalten. Sie kann auch bestätigen, dass ein geplanter Trainingsaufbau gut vertretbar ist. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4) ----"
                  }
                }
