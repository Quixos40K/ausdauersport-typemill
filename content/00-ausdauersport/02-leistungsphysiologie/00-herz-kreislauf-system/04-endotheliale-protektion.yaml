              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist endotheliale Protektion einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Endotheliale Protektion beschreibt den Schutz und die Funktionsfähigkeit der inneren Gefäßauskleidung. Diese Gefäßinnenhaut hilft dabei, Blutfluss, Gefäßweite, Blutdruckregulation und Entzündungsreaktionen zu steuern. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist das Endothel im Ausdauertraining wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Beim Ausdauertraining müssen die Gefäße den Blutfluss an die arbeitende Muskulatur anpassen. Ein gut funktionierendes Endothel unterstützt die Gefäßerweiterung und erleichtert die Versorgung mit Sauerstoff und Nährstoffen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie kann Bewegung die Gefäßfunktion unterstützen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Regelmäßige Bewegung erhöht den Blutfluss und erzeugt Schubspannung an der Gefäßwand. Diese mechanischen Reize können endotheliale Signalwege aktivieren, die langfristig eine bessere Gefäßfunktion unterstützen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Rolle spielt Stickstoffmonoxid?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Stickstoffmonoxid ist ein wichtiger Botenstoff für die Gefäßerweiterung. Es hilft, die Gefäßweite an den aktuellen Bedarf anzupassen und den Blutfluss besser zu regulieren. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist hartes Training besser für die Gefäße?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Intensive Einheiten können starke Reize setzen, sind aber auch belastender. Für die Gefäßfunktion sind regelmäßige, gut dosierte Belastungen und ausreichende Regeneration besonders wichtig. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was kann die endotheliale Funktion belasten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Zu wenig Erholung, chronischer Stress, Schlafmangel, Rauchen, ungünstige Stoffwechsellage, Infekte und dauerhafte Überlastung können die Gefäßfunktion belasten. Training sollte deshalb immer im Gesamtbild betrachtet werden. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5) [[6]](quelle-6) ----"
                  }
                }
              ]
