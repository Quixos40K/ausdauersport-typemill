    title: 'Endotheliale Protektion'
    description: 'Endotheliale Protektion beschreibt den Schutz und die Funktionsfähigkeit der inneren Gefäßauskleidung. Im Ausdauertraining ist das wichtig, weil gesunde Gefäße Blutfluss, Gefäßweite, Sauerstofftransport und Blutdruckregulation unterstützen. Entscheidend ist, dass regelmäßige, gut dosierte Bewegung die Gefäßfunktion fördern kann, während chronische Überlastung, Entzündung, Stress, Rauchen oder Stoffwechselprobleme sie belasten können.'
