    title: Angiogenese
    description: 'Angiogenese beschreibt die Bildung neuer Blutgefäße aus bereits vorhandenen Gefäßen. Im Ausdauertraining ist das wichtig, weil eine bessere Kapillarisierung die Versorgung der Muskulatur mit Sauerstoff und Nährstoffen unterstützen kann. Entscheidend ist, dass Angiogenese nicht isoliert betrachtet wird, sondern zusammen mit Trainingsreiz, Stoffwechsel, Durchblutung und muskulärer Anpassung.'
