    title: 'Herzvolumina und Sportherz'
    description: 'Herzvolumina beschreiben, wie viel Blut die Herzkammern aufnehmen und auswerfen können. Im Ausdauertraining ist das wichtig, weil ein trainiertes Herz bei gleicher Belastung oft ökonomischer arbeitet. Das Sportherz beschreibt dabei eine meist physiologische Anpassung an regelmäßiges Ausdauertraining, muss aber immer von krankhaften Veränderungen unterschieden werden.'
