    title: 'Kardiale Lastquantifizierung'
    description: 'Kardiale Lastquantifizierung beschreibt, wie die Belastung des Herz-Kreislauf-Systems während des Trainings eingeordnet wird. Im Ausdauertraining ist das wichtig, weil nicht nur Tempo oder Kilometer zählen, sondern auch Herzfrequenz, Dauer, Intensität, Erholung und individuelle Reaktion. Entscheidend ist, zwischen äußerer Trainingsleistung und innerer kardialer Beanspruchung zu unterscheiden.'
