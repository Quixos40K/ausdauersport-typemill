    description: 'Nervensystem und zentrale Ermüdung beschreiben, wie Gehirn, Rückenmark und Nerven die Ausdauerleistung steuern und begrenzen können. Im Ausdauertraining ist das wichtig, weil Ermüdung nicht nur in der Muskulatur entsteht, sondern auch durch Wahrnehmung, Motivation, Schutzmechanismen, Temperatur, Stoffwechselstress und neuronale Signalverarbeitung beeinflusst wird. Entscheidend ist: Leistung wird nicht nur durch den Muskel erzeugt, sondern vom Nervensystem reguliert'
