    title: 'Ruhetag und aktive Erholung'
    description: 'Ruhetag und aktive Erholung beschreiben zwei unterschiedliche Wege, Belastung zu verarbeiten. Ein Ruhetag bedeutet, bewusst keinen Trainingsreiz zu setzen. Aktive Erholung nutzt sehr leichte Bewegung, um Durchblutung, Beweglichkeit und subjektives Wohlbefinden zu unterstützen. Entscheidend ist, dass Erholung nicht als Trainingsausfall verstanden wird, sondern als Teil der Anpassung.'
