    title: 'Regeneration und Gesundheit'
    description: 'Regeneration und Gesundheit beschreibt, wie Erholung, Schlaf, Ernährung, Entzündung, Immunsystem und Gesamtbelastung die langfristige Belastbarkeit im Ausdauersport beeinflussen. Gutes Ausdauertraining entsteht nicht nur durch Trainingsreize, sondern durch die Fähigkeit des Körpers, diese Reize zu verarbeiten und daraus stabile Anpassungen aufzubauen.'
