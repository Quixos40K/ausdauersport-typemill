    title: 'Muskelkater und Gewebereparatur'
    description: "Muskelkater und Gewebereparatur beschreiben die Reaktion des Körpers auf ungewohnte oder hohe muskuläre Belastung. Im Ausdauertraining tritt Muskelkater besonders nach Bergabläufen, langen Läufen, Tempowechseln, Krafttraining oder neuen Bewegungen auf. Entscheidend ist, Muskelkater nicht als Trainingsqualität zu verwechseln, sondern als Zeichen erhöhter Gewebebelastung einzuordnen.\n"
