              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Muskelkater einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Muskelkater ist eine verzögerte Muskelbeschwerde nach ungewohnter oder hoher Belastung. Er entsteht meist einige Stunden nach dem Training und kann ein bis mehrere Tage spürbar bleiben. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Muskelkater ein Zeichen für gutes Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Muskelkater zeigt vor allem, dass das Gewebe ungewohnt oder stark belastet wurde. Training kann auch ohne Muskelkater sehr wirksam sein. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kommt Muskelkater von Laktat?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Muskelkater wird nicht dadurch erklärt, dass Laktat im Muskel bleibt. Er hängt eher mit Gewebebelastung, Entzündungsreaktion und Reparaturprozessen zusammen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Darf man mit Muskelkater laufen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei leichtem Muskelkater kann lockere Bewegung möglich sein. Bei starkem Muskelkater, veränderter Lauftechnik oder Schmerzen sollte die Einheit angepasst oder verschoben werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was hilft bei Muskelkater?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Hilfreich sind meist Schlaf, ausreichende Energiezufuhr, Protein, Flüssigkeit, lockere Bewegung und Zeit. Aggressive Maßnahmen sind selten nötig. [[1]](quelle-1) [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann ist Muskelkater ein Warnsignal?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Warnzeichen sind stechende Schmerzen, einseitige Beschwerden, Schwellung, deutlicher Kraftverlust, zunehmender Schmerz während Belastung oder veränderte Lauftechnik. [[1]](quelle-1) [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie kann man starken Muskelkater vermeiden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Neue Reize sollten schrittweise aufgebaut werden. Besonders Bergabläufe, Sprints, Krafttraining, Sprünge und ungewohnte Untergründe sollten dosiert eingeführt werden. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5) ----"
                  }
                }
              ]
