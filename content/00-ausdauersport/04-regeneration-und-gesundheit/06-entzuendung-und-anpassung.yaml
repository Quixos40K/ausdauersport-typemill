    title: 'Entzündung und Anpassung'
    description: 'Entzündung und Anpassung beschreiben, wie der Körper auf Trainingsbelastung reagiert. Eine kurzfristige Entzündungsreaktion nach Training ist nicht automatisch schlecht, sondern Teil von Reparatur, Signalgebung und Anpassung. Entscheidend ist die Dosis: Wird die Belastung gut verarbeitet, entsteht Anpassung. Wird sie dauerhaft zu hoch, kann aus einem sinnvollen Reiz eine Überlastung werden.'
