              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Ist Entzündung nach Training schlecht?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Eine kurzfristige Entzündungsreaktion kann Teil von Reparatur, Signalgebung und Anpassung sein. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum braucht Anpassung Entzündung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Training setzt einen Reiz, der den Körper kurzfristig aus dem Gleichgewicht bringt. Die Reaktion darauf startet Reparatur- und Umbauprozesse. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann wird Entzündung problematisch?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Problematisch wird sie, wenn Beschwerden nicht abklingen, stärker werden, Schwellung entsteht, Schmerzen zunehmen oder die Bewegungsqualität leidet. [[1]](quelle-1) [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man Entzündung komplett vermeiden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Ziel ist nicht, jede Reaktion zu vermeiden, sondern Belastung so zu dosieren, dass der Körper sie verarbeiten kann. [[1]](quelle-1) [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was hilft dem Körper bei Anpassung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Schlaf, ausreichende Energiezufuhr, Protein, Flüssigkeit, passende Trainingssteuerung und genügend Zeit zwischen belastenden Reizen unterstützen die Verarbeitung. [[4]](quelle-4) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann man mit leichter Entzündungsreaktion trainieren?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt von der Reaktion ab. Leichte Steifigkeit oder normale Müdigkeit kann mit lockerer Bewegung vereinbar sein. Zunehmende Schmerzen oder Schwellung sprechen eher für Entlastung. [[1]](quelle-1) [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei Entzündung und Anpassung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, jede starke Reaktion als gutes Training zu sehen. Anpassung entsteht nicht durch maximale Reizung, sondern durch sinnvoll dosierte Belastung und ausreichende Erholung. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4) ----"
                  }
                }
              ]
