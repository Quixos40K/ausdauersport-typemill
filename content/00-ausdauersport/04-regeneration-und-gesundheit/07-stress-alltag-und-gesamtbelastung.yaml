    title: 'Stress, Alltag und Gesamtbelastung'
    description: 'Stress, Alltag und Gesamtbelastung beschreiben, dass der Körper Training nicht isoliert verarbeitet. Beruf, Schlaf, Ernährung, Familie, mentale Belastung und Lebensumstände zählen zur gleichen Belastungsbilanz wie Laufumfang, Intensität und Wettkämpfe. Entscheidend ist nicht nur, wie hart trainiert wird, sondern ob die gesamte Belastung zur aktuellen Regenerationsfähigkeit passt.'
