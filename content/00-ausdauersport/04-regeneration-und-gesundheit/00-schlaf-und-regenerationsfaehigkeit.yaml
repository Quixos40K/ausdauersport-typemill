              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Schlaf und Regenerationsfähigkeit einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Schlaf und Regenerationsfähigkeit beschreiben, wie gut der Körper nach Training und Alltag wieder belastbar wird. Schlaf unterstützt dabei Reparatur, Nervensystem, Stoffwechsel und mentale Erholung. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Schlaf im Ausdauertraining wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ausdauertraining setzt Belastungsreize, die erst in der Erholung verarbeitet werden. Schlaf hilft dem Körper, diese Reize besser zu integrieren und wieder leistungsbereit zu werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie viele Stunden Schlaf brauchen Ausdauersportler?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Viele Erwachsene liegen ungefähr im Bereich von sieben bis neun Stunden. Bei hoher Trainingslast, viel Stress oder intensiven Trainingsphasen kann der individuelle Bedarf höher sein. [[4]](quelle-4) [[5]](quelle-5) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist eine schlechte Nacht vor dem Wettkampf schlimm?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Eine einzelne schlechte Nacht ist meist weniger problematisch als ein längerfristiges Schlafdefizit. Entscheidend ist die Schlaf- und Erholungslage über mehrere Tage und Wochen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man nach schlechtem Schlaf hart trainieren?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt vom Gesamtbild ab. Nach einer einzelnen schlechten Nacht kann lockeres Training möglich sein. Bei mehreren schlechten Nächten, starker Müdigkeit oder zusätzlichen Warnzeichen ist eine Anpassung der Einheit oft sinnvoller. [[1]](quelle-1) [[4]](quelle-4) [[5]](quelle-5) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Können Nickerchen die Regeneration unterstützen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Kurze Nickerchen können helfen, Müdigkeit zu reduzieren und Schlafdefizite etwas abzufedern. Sie ersetzen aber keinen dauerhaft ausreichenden Nachtschlaf. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Woran erkennt man, dass Schlaf die Regeneration begrenzt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Hinweise können anhaltende Müdigkeit, schlechte Stimmung, ungewöhnlich schwere Beine, sinkende Motivation, erhöhte Reizbarkeit, schlechtere Trainingsqualität oder häufiges Krankheitsgefühl sein. [[4]](quelle-4) [[5]](quelle-5) [[6]](quelle-6) ----"
                  }
                }
              ]
