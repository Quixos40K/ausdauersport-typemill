    description: 'Schlaf und Regenerationsfähigkeit beschreiben, wie gut der Körper nach Training, Alltag und mentaler Belastung wieder in einen belastbaren Zustand zurückkehrt. Im Ausdauertraining ist Schlaf wichtig, weil viele Anpassungsprozesse nicht während der Einheit, sondern in der Erholung entstehen. Entscheidend ist nicht nur die Schlafdauer, sondern auch Regelmäßigkeit, Schlafqualität und die gesamte Belastung des Tages.'
