    navtitle: 'Ernährung nach dem Training'
    title: 'Ernährung nach dem Training'
    description: 'Ernährung nach dem Training beschreibt, wie der Körper nach einer Belastung wieder mit Energie, Flüssigkeit und Baustoffen versorgt wird. Im Ausdauertraining ist das wichtig, weil Training Glykogenspeicher leert, Flüssigkeit und Elektrolyte verbraucht und Reparaturprozesse anstößt. Entscheidend ist nicht ein perfektes „Recovery-Fenster“, sondern dass Zufuhr, Trainingsbelastung und nächster Trainingsreiz zusammenpassen.'
