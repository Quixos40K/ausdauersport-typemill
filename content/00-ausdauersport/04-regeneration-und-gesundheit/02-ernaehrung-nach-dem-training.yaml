              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeutet Ernährung nach dem Training einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ernährung nach dem Training bedeutet, dem Körper nach Belastung wieder Energie, Flüssigkeit und Baustoffe zuzuführen. Ziel ist eine bessere Erholung und Vorbereitung auf die nächste Belastung. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Muss man direkt nach dem Training essen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht nach jeder Einheit. Nach langen, intensiven oder sehr schweißtreibenden Einheiten ist eine zeitnahe Zufuhr sinnvoller als nach einem kurzen lockeren Lauf. [[1]](quelle-1) [[2]](quelle-2) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist nach dem Training wichtiger: Kohlenhydrate oder Protein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Für Ausdauersportler sind meist beide wichtig. Kohlenhydrate füllen Energiespeicher auf, Protein unterstützt Reparatur und Anpassung. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Reicht ein Proteinshake nach dem Lauf?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Proteinshake kann praktisch sein, ersetzt aber nicht automatisch eine vollständige Regeneration. Nach langen oder intensiven Einheiten braucht der Körper oft auch Kohlenhydrate, Flüssigkeit und Salz. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was sollte man nach einem langen Lauf beachten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nach einem langen Lauf sind Kohlenhydrate, Protein, Flüssigkeit und Elektrolyte besonders wichtig. Je schneller die nächste Einheit folgt, desto bewusster sollte die Zufuhr geplant werden. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Essen nach einem lockeren kurzen Lauf nötig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Oft reicht die normale nächste Mahlzeit. Eine spezielle Recovery-Strategie ist nach kurzen lockeren Einheiten meistens nicht nötig. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei Ernährung nach dem Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, nach harten Einheiten nur an Protein zu denken und Kohlenhydrate, Flüssigkeit oder Salz zu vernachlässigen. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3) [[5]](quelle-5) ----"
                  }
                }
              ]
