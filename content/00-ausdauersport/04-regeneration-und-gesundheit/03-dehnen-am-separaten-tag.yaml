    title: 'Dehnen am separaten Tag'
    description: 'Dehnen als Trainingseinheit Tag bedeutet, Beweglichkeitsarbeit bewusst von intensiven Lauf- oder Krafteinheiten zu trennen. Im Ausdauertraining ist das sinnvoll, weil Dehnen dann nicht zwischen Ermüdung, Zeitdruck und Trainingsreiz untergeht. Entscheidend ist, Dehnen nicht als Pflichtprogramm gegen Verletzungen zu verstehen, sondern als gezielte Maßnahme für Beweglichkeit, Körperwahrnehmung und Entspannung.'
