    title: 'Redistribution und Vacant-Space-Theorie'
    description: 'Redistribution und Vacant-Space-Theorie beschreiben, wie Immunzellen durch Ausdauerbelastung vorübergehend umverteilt werden und wie dadurch langfristig Raum für eine erneuerte Immunzellbalance entstehen könnte. Im Ausdauertraining ist das wichtig, weil die sinkende Zellzahl im Blut nach Belastung nicht automatisch Immunschwäche bedeutet. Entscheidend ist: Viele Immunzellen verschwinden nicht, sondern wechseln ihren Ort.'
