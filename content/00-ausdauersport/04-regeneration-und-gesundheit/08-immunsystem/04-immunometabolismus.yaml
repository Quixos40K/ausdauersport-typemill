    title: Immunometabolismus
    description: 'Immunometabolismus beschreibt, wie der Stoffwechsel von Immunzellen ihre Funktion beeinflusst. Im Ausdauertraining ist das wichtig, weil Immunzellen Energie benötigen, um zu zirkulieren, Entzündung zu regulieren, Gewebe zu überwachen und Reparaturprozesse zu begleiten. Entscheidend ist: Das Immunsystem reagiert nicht nur auf Erreger, sondern auch auf Energieverfügbarkeit, Trainingsbelastung, Schlaf, Ernährung und Regeneration.'
