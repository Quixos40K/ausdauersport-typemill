              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Immunometabolismus einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Immunometabolismus beschreibt, wie der Stoffwechsel von Immunzellen ihre Funktion beeinflusst. Immunzellen brauchen Energie, um zu reagieren, zu wandern, Entzündung zu regulieren und Reparaturprozesse zu begleiten. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Immunometabolismus im Ausdauertraining wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ausdauertraining verändert den Energiehaushalt des Körpers. Dadurch verändert sich auch die Umgebung, in der Immunzellen arbeiten. Besonders bei hoher Belastung, wenig Schlaf oder geringer Energiezufuhr kann das wichtig werden. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Rolle spielt Energieverfügbarkeit?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Energieverfügbarkeit ist zentral, weil das Immunsystem Energie benötigt. Wenn Training und Alltag viel Energie verbrauchen, aber zu wenig zugeführt wird, kann das Regeneration und Immunfunktion belasten. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sind Kohlenhydrate für das Immunsystem wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Kohlenhydrate können besonders bei intensiven oder langen Belastungen wichtig sein, weil sie den Stress der Einheit beeinflussen. Sehr niedrige Kohlenhydratverfügbarkeit kann den Körper stärker belasten und sollte nicht unüberlegt eingesetzt werden. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Entzündung nach dem Training schlecht?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Entzündung gehört zu Reparatur und Anpassung. Problematisch wird sie eher, wenn sie dauerhaft erhöht bleibt oder der Körper nach Belastung nicht gut in Regulation zurückfindet. [[1]](quelle-1) [[2]](quelle-2) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei Immunometabolismus?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, nur einzelne Nährstoffe oder Supplemente zu betrachten. Wichtiger ist meist das Gesamtbild aus Trainingsbelastung, Energiezufuhr, Schlaf, Regeneration und Alltagsstress. [[3]](quelle-3) [[4]](quelle-4) ---- ----"
                  }
                }
              ]
