    description: 'Ausdauersport gegen Immunoseneszenz beschreibt, wie regelmäßige aerobe Belastung altersbedingte Veränderungen des Immunsystems günstig beeinflussen kann. Im Ausdauertraining ist das wichtig, weil Immunalterung nicht nur mit Infektanfälligkeit, sondern auch mit chronisch erhöhter Entzündungsaktivität, schlechterer Zellregulation und verlangsamter Erholung zusammenhängen kann. '
