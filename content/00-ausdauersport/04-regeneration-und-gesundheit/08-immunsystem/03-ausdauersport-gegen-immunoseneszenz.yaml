              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Immunoseneszenz einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Immunoseneszenz beschreibt altersbedingte Veränderungen des Immunsystems. Immunzellen können weniger flexibel reagieren, entzündliche Signale können länger bestehen bleiben und die Immunregulation verändert sich. [[1]](quelle-1) [[2]](quelle-2) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann Ausdauersport Immunoseneszenz verhindern?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ausdauersport kann Immunoseneszenz nicht verhindern oder rückgängig machen. Regelmäßige, gut dosierte Bewegung kann aber helfen, Immunzellen zu mobilisieren, Entzündung besser zu regulieren und die Anpassungsfähigkeit des Körpers zu unterstützen. [[1]](quelle-1) [[2]](quelle-2) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist regelmäßiges Training wichtiger als einzelne harte Einheiten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das Immunsystem passt sich vor allem an wiederholte Reize an. Einzelne sehr harte Einheiten können stark belasten, während regelmäßige, gut verkraftete Einheiten langfristig eher eine stabile Immunbalance unterstützen. [[2]](quelle-2) [[4]](quelle-4) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Rolle spielt Entzündung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Entzündung ist nicht automatisch schlecht. Sie gehört zu Reparatur und Anpassung. Problematisch wird sie eher, wenn sie dauerhaft erhöht bleibt oder durch zu viel Training, Schlafmangel und Energiemangel verstärkt wird. [[2]](quelle-2) [[4]](quelle-4) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was bedeutet das für ältere Läufer?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Für ältere Läufer ist Belastungsverträglichkeit besonders wichtig. Sinnvoll sind regelmäßige Ausdauerreize, ausreichend Erholung, gute Energieversorgung und eine Trainingssteuerung, die Warnzeichen ernst nimmt. [[1]](quelle-1) [[2]](quelle-2) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei diesem Thema?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist die Annahme, mehr Training sei automatisch besser für das Immunsystem. Entscheidend ist nicht maximale Belastung, sondern die Balance aus Reiz, Regeneration und langfristiger Regelmäßigkeit. [[2]](quelle-2) [[4]](quelle-4) [[5]](quelle-5) ---- ----"
                  }
                }
              ]
