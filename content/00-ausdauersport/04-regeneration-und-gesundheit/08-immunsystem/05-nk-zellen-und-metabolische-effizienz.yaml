              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was sind NK-Zellen einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "NK-Zellen sind natürliche Killerzellen des angeborenen Immunsystems. Sie helfen dabei, auffällige Zellen zu erkennen und gehören zur schnellen Immunüberwachung des Körpers. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum sind NK-Zellen für Ausdauersportler interessant?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "NK-Zellen reagieren deutlich auf körperliche Belastung. Während intensiver oder längerer Einheiten können sie vermehrt im Blut erscheinen und nach der Belastung wieder in Gewebe oder Schleimhäute umverteilt werden. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was bedeutet metabolische Effizienz bei NK-Zellen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Metabolische Effizienz bedeutet, dass NK-Zellen ihre Energie sinnvoll nutzen. Sie sollen schnell reagieren können, aber nicht dauerhaft überaktiv bleiben. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Macht Ausdauertraining NK-Zellen stärker?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht im einfachen Sinn. Ausdauertraining kann NK-Zellen mobilisieren und ihre Regulation beeinflussen. Entscheidend ist aber nicht maximale Aktivierung, sondern eine gute Balance aus Reaktion, Energieversorgung und Erholung. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Rolle spielt Ernährung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ernährung beeinflusst die Energieverfügbarkeit. Bei hoher Trainingsbelastung kann zu wenig Energie oder eine sehr niedrige Kohlenhydratverfügbarkeit zusätzlichen Stress erzeugen und die Immunregulation belasten. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei diesem Thema?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, NK-Zellen nur als Abwehrzellen zu sehen. Sie sind auch metabolisch aktive Zellen, deren Funktion von Energie, Schlaf, Belastung und Regeneration abhängt. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4) ---- ----"
                  }
                }
              ]
