    navtitle: 'NK-Zellen und metabolische Effizienz'
    title: 'NK-Zellen und metabolische Effizienz'
    description: 'NK-Zellen und metabolische Effizienz beschreiben, wie natürliche Killerzellen Energie nutzen, um ihre Immunaufgaben zu erfüllen. Im Ausdauertraining ist das wichtig, weil NK-Zellen auf Belastung, Stresshormone, Entzündungssignale und Energieverfügbarkeit reagieren. Entscheidend ist: Regelmäßiges Ausdauertraining kann die Immunzellen nicht einfach „stärker“ machen, aber es kann ihre Regulation, Belastbarkeit und Stoffwechseleffizienz günstig beeinflussen.'
