    title: 'Immunantwort auf Ausdauertraining'
    description: 'Die Immunantwort auf Ausdauertraining beschreibt, wie das Immunsystem auf körperliche Belastung reagiert. Im Ausdauertraining ist das wichtig, weil Training nicht nur Muskeln, Herz und Stoffwechsel fordert, sondern auch Immunzellen, Entzündungssignale und Regenerationsprozesse beeinflusst. Entscheidend ist die Dosis: Angemessenes Training kann die Immunfunktion unterstützen, während zu hohe Gesamtbelastung die Infektanfälligkeit vorübergehend erhöhen kann.'
