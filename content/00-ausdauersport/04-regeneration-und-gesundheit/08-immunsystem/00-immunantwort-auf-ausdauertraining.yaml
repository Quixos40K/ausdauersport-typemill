              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist die Immunantwort auf Ausdauertraining einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Die Immunantwort auf Ausdauertraining beschreibt, wie das Immunsystem auf körperliche Belastung reagiert. Während und nach dem Training verändern sich Immunzellen, Entzündungssignale, Stresshormone und Regenerationsprozesse. [[6]](quelle-6) [[8]](quelle-8) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Ausdauertraining gut oder schlecht für das Immunsystem?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ausdauertraining ist nicht pauschal gut oder schlecht für das Immunsystem. Regelmäßiges, gut dosiertes Training kann die Immunfunktion unterstützen. Zu viel Belastung ohne ausreichende Erholung kann den Körper dagegen vorübergehend anfälliger machen. [[1]](quelle-1) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum bin ich nach harten Trainingsphasen manchmal anfälliger?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nach sehr langen oder intensiven Belastungen ist der Körper mit Reparatur, Energieausgleich und Regulation beschäftigt. Wenn zusätzlich Schlafmangel, Stress oder geringe Energiezufuhr dazukommen, kann die Belastbarkeit des Immunsystems sinken. [[6]](quelle-6) [[8]](quelle-8) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bedeutet Entzündung nach Training immer etwas Schlechtes?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Entzündung ist ein normaler Teil von Reparatur und Anpassung. Problematisch wird sie eher, wenn sie dauerhaft erhöht bleibt oder wenn der Körper zwischen den Belastungen nicht ausreichend regenerieren kann. [[1]](quelle-1) [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Rolle spielt Ernährung für die Immunantwort?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ernährung liefert Energie und Baustoffe für Training, Reparatur und Immunfunktion. Besonders bei hoher Trainingsbelastung kann zu geringe Energie- oder Kohlenhydratzufuhr die Regeneration und Immunbalance belasten. [[6]](quelle-6) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann sollte man mit Training vorsichtig sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Vorsicht ist sinnvoll bei Fieber, starkem Krankheitsgefühl, ungewöhnlicher Erschöpfung, deutlichen Infektzeichen oder Symptomen im Brustbereich. In solchen Situationen sollte Training nicht erzwungen werden. [[6]](quelle-6) [[8]](quelle-8) ----"
                  }
                }
              ]
