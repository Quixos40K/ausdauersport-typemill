              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist der Open-Window-Effekt einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der Open-Window-Effekt beschreibt eine mögliche empfindliche Phase nach sehr langer oder intensiver Belastung. In dieser Zeit kann der Körper stärker mit Regeneration, Energieausgleich und Immunregulation beschäftigt sein. [[5]](quelle-5) [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist das Immunsystem nach dem Training wirklich geschwächt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht unbedingt. Die frühere Vorstellung einer einfachen Immunschwäche ist zu grob. Häufig verändern sich Immunzellverteilung, Stresshormone und Entzündungssignale vorübergehend. [[1]](quelle-1) [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann ist der Open-Window-Effekt besonders relevant?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Besonders relevant ist er nach Wettkämpfen, langen Läufen, sehr intensiven Einheiten, Trainingslagern oder Phasen mit hoher Gesamtbelastung. Das gilt vor allem, wenn wenig Schlaf, Energiemangel oder Alltagsstress dazukommen. [[5]](quelle-5) [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie lange dauert das offene Fenster?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das lässt sich nicht pauschal sagen. Die Dauer hängt von Belastung, Trainingszustand, Schlaf, Ernährung und Gesamtstress ab. Nach lockeren Einheiten ist die Reaktion meist deutlich geringer als nach sehr langen oder harten Belastungen. [[5]](quelle-5) [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was kann ich nach harten Einheiten tun?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Sinnvoll sind ausreichend Schlaf, passende Energie- und Flüssigkeitszufuhr, lockere Erholung, Wärme und ein bewusster Umgang mit zusätzlichem Stress. Direkt nach sehr harten Belastungen sollte nicht sofort die nächste intensive Einheit folgen. [[5]](quelle-5) [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bedeutet der Open-Window-Effekt, dass hartes Training ungesund ist?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Hartes Training kann sinnvoll sein, wenn es richtig dosiert und gut eingebettet wird. Problematisch wird es, wenn hohe Belastung dauerhaft ohne ausreichende Regeneration stattfindet. [[2]](quelle-2) [[4]](quelle-4) [[6]](quelle-6) ---- ----"
                  }
                }
              ]
