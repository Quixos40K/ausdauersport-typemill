    title: Open-Window-Effekt
    description: 'Der Open-Window-Effekt beschreibt die Annahme, dass das Immunsystem nach sehr langen oder intensiven Ausdauerbelastungen vorübergehend anfälliger für Infekte sein kann. Im Ausdauertraining ist das wichtig, weil harte Einheiten, Wettkämpfe, Schlafmangel, Energiemangel und Alltagsstress zusammen die Belastbarkeit des Körpers senken können. Entscheidend ist: Das „offene Fenster“ ist keine einfache Immunschwäche, sondern eine kurzfristige Veränderung der Immunregulation im Gesamtstress des Körpers.'
