    title: 'Kollagen, Gelatine und Vitamin C'
    description: 'Kollagen, Gelatine und Vitamin C werden im Ausdauersport häufig im Zusammenhang mit Sehnen, Bändern, Knorpel und Bindegewebe diskutiert. Kollagen und Gelatine liefern bestimmte Aminosäuren, Vitamin C ist an der körpereigenen Kollagenbildung beteiligt. Entscheidend ist aber: Supplemente ersetzen keinen passenden Trainingsreiz, keine ausreichende Energiezufuhr und keine langfristige Belastungssteuerung.'
