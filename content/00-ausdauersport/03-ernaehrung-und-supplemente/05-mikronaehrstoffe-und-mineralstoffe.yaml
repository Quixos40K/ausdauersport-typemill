    title: 'Mikronährstoffe und Mineralstoffe'
    description: 'Mikronährstoffe und Mineralstoffe liefern keine direkte Trainingsenergie, sind aber für viele Prozesse im Ausdauersport wichtig. Sie unterstützen Sauerstofftransport, Energiestoffwechsel, Muskelfunktion, Knochenstoffwechsel, Immunsystem und Regeneration. Entscheidend ist nicht, möglichst viele Präparate einzunehmen, sondern Ernährung, Energieverfügbarkeit, Trainingsbelastung und individuelle Versorgung sinnvoll einzuordnen.'
