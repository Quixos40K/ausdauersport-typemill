              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was sind Supplemente mit Evidenz?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Supplemente mit Evidenz sind Ergänzungen, für die es in bestimmten Situationen wissenschaftliche Hinweise auf Nutzen gibt. Das bedeutet aber nicht, dass sie immer oder bei jedem Sportler wirken."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Supplemente sind im Ausdauersport besonders relevant?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Häufig relevant sind Kohlenhydrate, Elektrolyte, Koffein, Nitrat, bestimmte Pufferstoffe, Protein bei Bedarf und einzelne Mikronährstoffe bei nachgewiesenem Mangel."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sind Supplemente notwendig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Viele Ausdauersportler können sehr gut ohne viele Supplemente trainieren. Sinnvoll werden sie vor allem, wenn ein konkretes Ziel oder ein konkreter Bedarf besteht."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Macht Koffein schneller?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Koffein kann bei bestimmten Belastungen die Leistungsfähigkeit oder Belastungswahrnehmung verbessern. Die Reaktion ist aber individuell unterschiedlich und sollte im Training getestet werden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sind natürliche Supplemente automatisch sicher?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Natürlich bedeutet nicht automatisch wirksam oder risikofrei. Auch natürliche Produkte können unverträglich sein, falsch dosiert werden oder problematische Inhaltsstoffe enthalten."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei Supplementen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, Supplemente ohne klares Ziel einzunehmen. Sinnvoller ist es, zuerst Ernährung, Training und Regeneration zu prüfen und dann gezielt zu entscheiden."
                  }
                }
              ]
