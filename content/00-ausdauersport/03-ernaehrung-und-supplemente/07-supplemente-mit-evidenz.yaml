    navtitle: 'Supplemente mit Evidenz'
    title: 'Supplemente mit Evidenz'
    description: 'Supplemente mit Evidenz sind Produkte oder Substanzen, deren Nutzen für bestimmte Situationen im Sport wissenschaftlich besser belegt ist als bei vielen frei beworbenen Präparaten. Im Ausdauersport betrifft das vor allem Kohlenhydrate, Elektrolyte, Koffein, Nitrat, bestimmte Pufferstoffe, Protein bei Bedarf und einzelne Mikronährstoffe bei nachgewiesenem Mangel. Entscheidend ist aber: Ein Supplement wirkt nur dann sinnvoll, wenn Ernährung, Training, Regeneration, Sicherheit und Zielsetzung zusammenpassen.'
