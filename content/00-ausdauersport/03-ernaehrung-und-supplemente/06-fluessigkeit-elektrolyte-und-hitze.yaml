    navtitle: 'Flüssigkeit, Elektrolyte und Hitze'
    title: 'Flüssigkeit, Elektrolyte und Hitze'
    description: 'Flüssigkeit, Elektrolyte und Hitze beeinflussen im Ausdauersport Kreislauf, Thermoregulation, Muskelfunktion, Belastungsempfinden und Leistungsfähigkeit. Beim Schwitzen verliert der Körper Wasser und Elektrolyte, vor allem Natrium. Entscheidend ist nicht, möglichst viel zu trinken, sondern Flüssigkeitszufuhr, Natrium, Belastungsdauer, Temperatur, Schweißrate und Verträglichkeit sinnvoll aufeinander abzustimmen.'
