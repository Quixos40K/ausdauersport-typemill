              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was sind Fettsäuren einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Fettsäuren sind Bestandteile von Fetten. Der Körper nutzt sie als Energiequelle, als Bausteine von Zellmembranen und als Ausgangsstoffe für verschiedene Signalprozesse."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Omega-3 im Ausdauersport interessant?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Omega-3-Fettsäuren werden im Sport vor allem wegen ihrer Rolle bei Zellfunktion, Entzündungsregulation, Herz-Kreislauf-Gesundheit und Regeneration diskutiert."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen ALA, EPA und DHA?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "ALA kommt vor allem in pflanzlichen Quellen vor. EPA und DHA sind langkettige Omega-3-Fettsäuren und kommen vor allem in fettreichem Fisch oder Algenöl vor."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Reichen Leinsamen und Walnüsse für Omega-3 aus?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Sie liefern ALA und können sinnvoll sein. Da die Umwandlung von ALA zu EPA und DHA begrenzt ist, kann bei Fischverzicht eine direkte EPA- und DHA-Quelle wie Algenöl relevant sein."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Macht Omega-3 direkt schneller?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Omega-3 ist kein klassisches Akut-Performance-Supplement. Es ist eher ein Baustein für langfristige Gesundheit, Zellfunktion und Regulationsprozesse."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei Omega-3?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, Omega-3 isoliert zu betrachten. Entscheidend bleibt die gesamte Ernährung, ausreichend Energie, gute Regeneration und eine sinnvolle Trainingssteuerung."
                  }
                }
              ]
