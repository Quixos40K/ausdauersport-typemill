    title: 'Energieverfügbarkeit und Makronährstoffe'
    description: 'Energieverfügbarkeit beschreibt, wie viel Energie dem Körper nach dem Training für grundlegende Funktionen, Anpassung und Regeneration bleibt. Makronährstoffe liefern diese Energie und erfüllen unterschiedliche Aufgaben: Kohlenhydrate unterstützen intensive Belastungen, Proteine helfen bei Reparatur und Anpassung, Fette sichern langfristige Energieversorgung und hormonelle Funktionen. '
