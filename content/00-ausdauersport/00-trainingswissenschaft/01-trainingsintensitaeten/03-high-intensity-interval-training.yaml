              "@type": "FAQPage",
              "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/trainingsintensitaeten/high-intensity-interval-training/#faq",
              "isPartOf": {
                "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/trainingsintensitaeten/high-intensity-interval-training/#webpage"
              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeutet HIIT im Ausdauertraining?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "HIIT steht für High-Intensity Interval Training. Gemeint sind wiederholte sehr intensive Belastungsabschnitte, die durch Pausen oder sehr lockere Entlastungsphasen unterbrochen werden. [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "In welcher Zone liegt HIIT?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "HIIT liegt je nach Zonenmodell meist im oberen Intensitätsbereich, häufig in Zone 4 bis 5. Entscheidend ist nicht nur die Zonenzahl, sondern ob die Belastung wirklich hoch genug ist, um den gewünschten Reiz zu setzen. [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wofür ist HIIT sinnvoll?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "HIIT kann genutzt werden, um VO₂max, hohe Leistungsbereiche, wiederholte Belastungsfähigkeit, Tempohärte und neuromuskuläre Aktivierung zu trainieren. [[1]](quelle-1) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist HIIT besser als lockeres Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht grundsätzlich. HIIT setzt starke Reize, ersetzt aber nicht die aerobe Grundlage. In vielen Ausdauerprogrammen entsteht der Nutzen gerade durch die Kombination aus vielen lockeren Einheiten und wenigen gezielten intensiven Reizen. [[6]](quelle-6) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie fühlt sich HIIT an?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "HIIT fühlt sich sehr anstrengend an. Die Atmung ist stark erhöht, Sprechen ist kaum möglich, und die Belastung kann nur kurz oder intervallartig aufrechterhalten werden. [[2]](quelle-2) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum braucht HIIT Erholung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "HIIT erzeugt eine hohe innere Belastung. Wenn die Erholung nicht ausreicht, sinkt die Qualität der Intervalle, Restermüdung sammelt sich an und das Risiko für nicht-funktionelles Overreaching oder Überlastung kann steigen. [[9]](quelle-9) [[10]](quelle-10) [[11]](quelle-11)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie oft sollte man HIIT trainieren?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt von Trainingsstand, Umfang, Ziel, Sportart und Erholungsfähigkeit ab. Für viele Ausdauerathleten sind wenige gezielte HIIT-Einheiten pro Woche ausreichend; der größere Teil des Trainings liegt meist niedriger in der Intensität. [[6]](quelle-6) [[10]](quelle-10)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen MIT und HIIT?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "MIT ist moderat und länger kontrolliert durchhaltbar. HIIT ist deutlich intensiver, wird meist in Intervallen organisiert und benötigt wegen der hohen Belastung mehr Regeneration. [[2]](quelle-2) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei HIIT?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, HIIT zu oft oder ohne klare Zielsetzung einzubauen. Dann entsteht viel Anstrengung, aber nicht automatisch bessere Anpassung. [[6]](quelle-6) [[11]](quelle-11)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Für wen ist HIIT besonders vorsichtig zu dosieren?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Besonders vorsichtig sollte HIIT bei Einsteigern, nach Krankheit oder Verletzung, bei hoher Alltagsbelastung, bei ungewöhnlichen Symptomen oder bei gesundheitlichen Risikofaktoren eingesetzt werden. In solchen Fällen kann medizinische oder sportmedizinische Abklärung sinnvoll sein. [[11]](quelle-11) [[12]](quelle-12) ----"
                  }
                }
              ]
            }
          ]
