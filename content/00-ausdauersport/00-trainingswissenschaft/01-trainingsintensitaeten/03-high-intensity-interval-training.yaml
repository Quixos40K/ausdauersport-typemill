    title: 'HIIT (High-Intensity Interval Training)'
    description: 'High-Intensity Interval Training, kurz HIIT, beschreibt Training mit sehr intensiven Belastungsabschnitten und geplanten Erholungsphasen. Die Belastungen sind deutlich härter als lockeres oder moderates Training und können nur für begrenzte Zeit aufrechterhalten werden.'
