    title: 'Polarisiertes Training'
    description: 'Polarisiertes Training ist eine Belastungsverteilung, bei der der größte Teil des Trainings sehr locker und ein kleiner Teil sehr intensiv durchgeführt wird. Der mittlere Intensitätsbereich wird bewusst begrenzt. Ziel ist es, viele gut verarbeitbare Ausdauerreize mit wenigen gezielten Hochintensitätsreizen zu kombinieren, ohne dauerhaft in einer ermüdenden Grauzone zu trainieren.'
