              "@type": "FAQPage",
              "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/trainingsintensitaeten/pyramidal-training/#faq",
              "isPartOf": {
                "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/trainingsintensitaeten/pyramidal-training/#webpage"
              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Pyramidal Training einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Pyramidal Training ist eine Trainingsverteilung mit viel niedriger Intensität, etwas mittlerer Intensität und wenig hoher Intensität. Die Trainingsmenge nimmt mit steigender Intensität ab. [[1]](quelle-1)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum heißt es pyramidal?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Weil die Verteilung wie eine Pyramide aufgebaut ist. Unten steht die breite Basis aus lockeren Einheiten. Darüber liegt ein kleinerer mittlerer Bereich. Die Spitze bilden wenige harte Einheiten. [[1]](quelle-1)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Pyramidal Training und polarisiertem Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Beim polarisierten Training wird der mittlere Intensitätsbereich stark begrenzt. Beim pyramidalen Training wird er gezielt genutzt, bleibt aber kleiner als der niedrige Intensitätsbereich und größer als der hochintensive Anteil. [[1]](quelle-1) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist mittlere Intensität beim pyramidalen Training erwünscht?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Mittlere Intensität ist ein wichtiger Bestandteil, solange sie kontrolliert eingesetzt wird. Sie kann Schwellenleistung, Tempohärte, Marathonpace und spezifische Ausdauer verbessern. [[4]](quelle-4) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was zählt als niedrige Intensität?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Niedrige Intensität umfasst lockere, gut kontrollierbare Belastungen. Die Atmung bleibt ruhig, Gespräche sind möglich, und die Einheit erzeugt keine starke Restermüdung. [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was zählt als mittlere Intensität?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Mittlere Intensität liegt zwischen locker und sehr hart. Dazu gehören zügige Dauerläufe, Schwellenläufe, längere Tempoblöcke oder kontrollierte Abschnitte im Marathon- oder Halbmarathontempo. [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was zählt als hohe Intensität?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Hohe Intensität umfasst harte Intervalle, VO2max-nahe Belastungen, Bergintervalle oder schnelle Wiederholungen. Diese Reize sind stark wirksam, aber auch deutlich ermüdender. [[10]](quelle-10)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Für wen ist Pyramidal Training geeignet?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Pyramidal Training eignet sich besonders für Ausdauerathleten, die längere Distanzen vorbereiten oder von kontrollierter Tempoarbeit profitieren. Es kann gut zu Halbmarathon, Marathon, Radsport und längeren Ausdauerzielen passen. [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Pyramidal Training besser als polarisiertes Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht grundsätzlich. Beide Modelle können funktionieren. Pyramidal Training passt oft gut zu längeren Distanzen und spezifischer Tempoarbeit. Polarisiertes Training kann sinnvoll sein, wenn Intensitäten stärker getrennt werden sollen. [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann Pyramidal Training im Marathontraining sinnvoll sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Marathontraining enthält häufig viele lockere Kilometer, aber auch gezielte Abschnitte im Marathon- oder Schwellenbereich. Deshalb ist Marathontraining oft eher pyramidal als rein polarisiert. [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler beim pyramidalen Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der häufigste Fehler ist, dass zu viele Einheiten in den mittleren Bereich rutschen. Dann wird die lockere Basis zu klein, die Ermüdung steigt, und harte Einheiten verlieren Qualität. [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie erkenne ich, ob ich zu viel mittlere Intensität trainiere?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Typische Hinweise sind schwere Beine, stagnierende Leistung, schlechter Schlaf, erhöhter Ruhepuls, niedrige HRV, fehlende Qualität in harten Einheiten oder das Gefühl, dass lockere Einheiten nicht mehr wirklich locker sind. Entscheidend ist nicht ein einzelnes Signal, sondern der Verlauf über mehrere Tage und Wochen. [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Brauche ich Herzfrequenzzonen für Pyramidal Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Herzfrequenzzonen können helfen, sind aber nicht zwingend. Auch Atemverhalten, Pace, Watt, Laktat oder subjektives Belastungsempfinden können genutzt werden. Wichtig ist, dass die Intensitätsbereiche klar unterschieden werden. [[8]](quelle-8) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist Pyramidal Training für Einsteiger geeignet?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Grundsätzlich ja, aber nur vereinfacht. Einsteiger sollten zuerst eine lockere Basis und regelmäßige Belastbarkeit aufbauen. Mittlere und hohe Intensitäten sollten vorsichtig und schrittweise ergänzt werden. [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie viele harte Einheiten passen in ein pyramidales Modell?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt von Trainingsstand, Ziel und Erholung ab. Für viele Athleten reichen wenige harte Reize pro Woche. Der Schwerpunkt bleibt auf niedriger und moderat eingesetzter mittlerer Intensität. [[7]](quelle-7) [[10]](quelle-10) ----"
                  }
                }
              ]
            }
          ]
        }
