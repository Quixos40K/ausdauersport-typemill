    title: 'LIT (Low Intensity Training)'
    description: '→ Low Intensity Training, kurz LIT, beschreibt Training mit niedriger Intensität. Die Belastung ist kontrolliert, ruhig und über längere Zeit gut durchhaltbar. Im Ausdauersport bildet LIT die Grundlage für viele Anpassungen, weil es regelmäßiges Training ermöglicht, ohne den Körper dauerhaft stark zu ermüden.'
