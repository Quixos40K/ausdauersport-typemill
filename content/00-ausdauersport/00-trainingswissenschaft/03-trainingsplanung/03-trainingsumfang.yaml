    description: 'Trainingsumfang beschreibt die Menge an Training innerhalb eines bestimmten Zeitraums. Im Ausdauertraining ist das wichtig, weil Umfang ein zentraler Reiz für Grundlagenausdauer, Belastbarkeit und langfristige Leistungsentwicklung ist. Entscheidend ist, dass Trainingsumfang nicht isoliert betrachtet wird, sondern immer zusammen mit Intensität, Häufigkeit und Erholung.'
