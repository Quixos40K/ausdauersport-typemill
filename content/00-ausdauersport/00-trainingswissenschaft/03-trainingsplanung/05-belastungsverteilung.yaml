    title: Belastungsverteilung
    description: 'Belastungsverteilung beschreibt, wie Trainingsumfang, Intensität und Erholung über eine Woche, einen Trainingsblock oder ein Trainingsjahr verteilt werden. Im Ausdauertraining ist das wichtig, weil nicht nur die Gesamtbelastung zählt, sondern auch, wann und wie stark einzelne Reize gesetzt werden. Entscheidend ist, harte, moderate und lockere Einheiten so zu kombinieren, dass Anpassung möglich bleibt.'
