              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Jahresplanung einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Jahresplanung ist die grobe Struktur eines Trainingsjahres. Sie legt fest, wann Aufbau, spezifisches Training, Wettkämpfe und Erholung im Vordergrund stehen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Jahresplanung im Ausdauertraining wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Sie hilft, Belastung und Erholung langfristig sinnvoll zu verteilen. Dadurch wird Training planbarer und das Risiko für Überlastung oder planloses Hin-und-her-Trainieren geringer."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Muss ein Trainingsjahr komplett durchgeplant sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Eine Jahresplanung muss nicht jede Einheit festlegen. Wichtiger ist ein flexibler Rahmen, der Ziele, Trainingsphasen, Alltag und Regeneration berücksichtigt."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie viele Hauptziele sollte ein Trainingsjahr haben?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Für viele Läufer sind ein bis zwei klare Hauptziele pro Jahr sinnvoller als sehr viele gleich wichtige Wettkämpfe. Nebenwettkämpfe können als Training, Test oder Erfahrung genutzt werden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein häufiger Fehler bei der Jahresplanung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein häufiger Fehler ist, Umfang, Intensität und Wettkämpfe zu stark zu verdichten. Dadurch fehlt Erholung, und die Leistungsentwicklung kann trotz viel Training stagnieren."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Für wen ist Jahresplanung besonders relevant?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Jahresplanung ist besonders relevant für Läufer mit Wettkampfzielen, steigenden Umfängen, wiederkehrender Ermüdung oder dem Wunsch nach langfristiger Leistungsentwicklung. ----"
                  }
                }
              ]
