              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeutet Wochenplanung im Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wochenplanung bedeutet, Trainingseinheiten, Erholung, Intensität, Umfang und Alltag innerhalb einer Woche sinnvoll zu organisieren. Sie legt fest, wann wichtige Reize und wann Erholung stattfinden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist Wochenplanung wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wochenplanung sorgt dafür, dass Trainingsreize verarbeitet werden können. Sie verhindert, dass harte Einheiten, lange Läufe und Alltag so ungünstig zusammenfallen, dass dauerhaft Restermüdung entsteht."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie viele harte Einheiten pro Woche sind sinnvoll?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt von Trainingsstand, Ziel, Umfang und Erholung ab. Für viele Ausdauerathleten reichen ein bis zwei harte oder besonders wichtige Einheiten pro Woche."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist eine Schlüsselsession?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Eine Schlüsselsession ist eine besonders wichtige Einheit mit klarem Trainingsziel, zum Beispiel Intervalltraining, Tempodauerlauf, langer Lauf oder wettkampfspezifische Einheit."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte der lange Lauf als harte Einheit zählen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, häufig schon. Auch wenn der lange Lauf locker ist, kann er durch Dauer und mechanische Belastung eine große Gesamtbelastung erzeugen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum sollten lockere Einheiten wirklich locker sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Lockere Einheiten sollen aerobe Reize setzen, ohne zu viel zusätzliche Ermüdung zu erzeugen. Werden sie zu schnell gelaufen, stören sie oft die Qualität der wichtigen Einheiten."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sind Ruhetage verlorene Trainingstage?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Ruhetage ermöglichen Anpassung, Reparatur und Erholung. Sie sind ein aktiver Bestandteil guter Trainingsplanung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann sollte Krafttraining in die Woche passen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Krafttraining sollte so platziert werden, dass es wichtige Ausdauereinheiten nicht unnötig beeinträchtigt. Schweres Krafttraining direkt vor einer Schlüsselsession ist oft ungünstig."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler in der Wochenplanung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der häufigste Fehler ist, zu viele Einheiten im mittleren oder harten Bereich zu planen. Dadurch steigt die Ermüdung, während die Qualität der wichtigsten Einheiten sinkt."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie plane ich Training bei wenig Zeit?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei wenig Zeit sollten zuerst die wichtigsten Einheiten geplant werden. Danach werden lockere Ergänzungen und Erholung realistisch darum herum gebaut."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte jede Trainingswoche gleich aussehen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht unbedingt. Eine gewisse Routine hilft, aber Trainingsphase, Ziel, Erholung und Alltag können unterschiedliche Wochenstrukturen erfordern."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was mache ich, wenn ich eine Einheit verpasse?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Eine verpasste Einheit sollte nicht automatisch nachgeholt werden. Häufig ist es besser, den Plan anzupassen, statt mehrere Belastungen zu eng zusammenzuschieben."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie erkenne ich, ob meine Wochenplanung funktioniert?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Eine Wochenplanung funktioniert, wenn wichtige Einheiten mit guter Qualität möglich sind, lockere Einheiten wirklich locker bleiben, Erholung ausreichend ist und sich Belastbarkeit langfristig verbessert."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie flexibel sollte eine Trainingswoche sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Eine Trainingswoche sollte eine klare Struktur haben, aber auf Schlaf, Stress, Beschwerden und Erholung reagieren können. Gute Planung ist strukturiert, aber nicht starr. ----"
                  }
                }
              ]
            }
          ]
