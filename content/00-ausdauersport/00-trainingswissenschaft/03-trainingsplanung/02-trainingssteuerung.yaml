    description: 'Trainingssteuerung beschreibt die laufende Anpassung des Trainings an Ziel, Leistungsstand, Belastung und Erholung. Im Ausdauertraining ist das wichtig, weil ein Plan nur dann sinnvoll bleibt, wenn er auf die tatsächliche Reaktion des Körpers angepasst wird. Entscheidend ist, Training nicht nur zu absolvieren, sondern regelmäßig einzuordnen und bei Bedarf zu verändern.'
