    title: Trainingshäufigkeit
    description: 'Trainingshäufigkeit beschreibt, wie oft innerhalb eines bestimmten Zeitraums trainiert wird. Im Ausdauertraining ist das wichtig, weil nicht nur die Menge des Trainings zählt, sondern auch die Verteilung der Reize über die Woche. Entscheidend ist, dass Trainingshäufigkeit zu Ziel, Umfang, Intensität, Erholung und Alltag passt.'
