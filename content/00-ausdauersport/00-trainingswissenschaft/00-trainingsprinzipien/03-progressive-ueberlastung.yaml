              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist progressive Überlastung einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Progressive Überlastung bedeutet, dass Training im Laufe der Zeit schrittweise anspruchsvoller wird. Der Körper bekommt dadurch immer wieder einen neuen, aber verarbeitbaren Anlass zur Anpassung. [[1]](quelle-1)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bedeutet progressive Überlastung, dass ich jede Woche mehr machen muss?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Progression muss nicht jede Woche stattfinden. Manchmal ist es sinnvoller, eine Belastung mehrere Wochen zu stabilisieren oder bewusst zu reduzieren, bevor der nächste Schritt folgt. [[4]](quelle-4) [[10]](quelle-10)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Trainingsfaktoren kann ich progressiv steigern?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Typische Stellschrauben sind Umfang, Intensität, Dauer, Häufigkeit, Pausengestaltung, Höhenmeter, Gelände, Kraftanteil, Technikanspruch und mechanische Belastung. [[2]](quelle-2) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte ich zuerst Umfang oder Intensität steigern?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Für viele Ausdauerathleten ist es sinnvoll, zuerst Regelmäßigkeit und lockeren Umfang aufzubauen. Intensität sollte gezielter eingesetzt werden, weil sie deutlich mehr Ermüdung erzeugt. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist zu schnelle Progression gefährlich?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Zu schnelle Steigerung kann die Regenerationsfähigkeit überfordern. Besonders Sehnen, Bänder, Knochen und Knorpel passen sich langsamer an als Muskulatur und Herz-Kreislauf-System. Dadurch können Überlastungsbeschwerden entstehen. [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Ist die 10-Prozent-Regel Pflicht?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Sie kann eine grobe Orientierung sein, ist aber kein Naturgesetz. Entscheidend sind Trainingsstand, Verletzungshistorie, Schlaf, Stress, Untergrund, Intensität und die bisherige Belastung. [[5]](quelle-5) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Gilt progressive Überlastung auch für lockere Läufe?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Auch lockere Läufe können progressiv aufgebaut werden, zum Beispiel durch etwas längere Dauer, höhere Wochenkonstanz oder mehr aerobe Gesamtzeit. Sie müssen dafür nicht hart werden. [[1]](quelle-1) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Gilt progressive Überlastung auch für Krafttraining?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Im Krafttraining kann Progression durch mehr Gewicht, mehr Wiederholungen, mehr Sätze, größere Bewegungsamplitude, langsamere exzentrische Phasen oder bessere Bewegungskontrolle entstehen. [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Woran erkenne ich, dass die Progression funktioniert?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein gutes Zeichen ist, wenn du mehr Belastung tolerierst, ohne dass lockere Einheiten schwerer werden oder Beschwerden zunehmen. Auch stabilere Leistung, bessere Erholung und kontrollierbare Ermüdung sprechen für eine passende Progression. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Woran erkenne ich, dass ich zu schnell gesteigert habe?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Warnsignale sind anhaltende Müdigkeit, schlechter Schlaf, sinkende Leistung, ungewöhnlich hoher Ruhepuls, auffällig niedrige HRV, Schmerzen an Sehnen oder Gelenken und eine dauerhaft hohe Anstrengung bei eigentlich lockeren Einheiten. [[8]](quelle-8) [[10]](quelle-10)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen progressiver Überlastung und Übertraining?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Progressive Überlastung ist eine geplante, verarbeitbare Steigerung. Übertraining oder nicht-funktionelles Overreaching entsteht, wenn Belastung dauerhaft größer ist als die Erholungsfähigkeit. [[4]](quelle-4) [[10]](quelle-10)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was sollte ich nach Krankheit oder Verletzung beachten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nach Krankheit oder Verletzung sollte die Progression deutlich vorsichtiger sein. Der Wiedereinstieg beginnt mit reduzierter Belastung, stabiler Beschwerdefreiheit und kleinen Steigerungen, bevor Intensität oder Umfang wieder erhöht werden. [[4]](quelle-4) [[8]](quelle-8)"
                  }
                }
              ]
            }
          ]
