    title: 'Progressive Überlastung'
    description: '→ Progressive Überlastung bedeutet, dass Trainingsreize im Laufe der Zeit schrittweise gesteigert werden, damit der Körper weiterhin Anpassungen entwickeln muss. Die Belastung wird dabei nicht beliebig erhöht, sondern so dosiert, dass sie den aktuellen Leistungsstand leicht übersteigt und trotzdem ausreichend verarbeitet werden kann.'
