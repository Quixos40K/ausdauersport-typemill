                "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/trainingsprinzipien/individualisierung/#webpage"
              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeutet Individualisierung im Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Individualisierung bedeutet, dass Training an die einzelne Person angepasst wird. Entscheidend sind Leistungsstand, Trainingsalter, Ziel, Erholung, Alltag, Gesundheit, Verletzungshistorie und die tatsächliche Reaktion auf Belastung. [[1]](quelle-1) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum funktioniert derselbe Trainingsplan nicht für alle?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Weil Menschen unterschiedlich auf Belastung reagieren. [[1]](quelle-1) Schlaf, Stress, Trainingshistorie, Technik, Gewebebelastbarkeit, Ernährung und Erholungsfähigkeit bestimmen, ob ein Reiz produktiv, zu schwach oder überfordernd ist."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sind Standardpläne deshalb schlecht?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Standardpläne können eine gute Orientierung geben. Sie sollten aber nicht blind abgearbeitet werden. [[3]](quelle-3) Sinnvoll wird ein Standardplan erst, wenn er an die eigene Belastbarkeit, den Alltag und die aktuelle Entwicklung angepasst wird."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Spezifität und Individualisierung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Spezifität fragt, ob das Training zum Ziel passt. Individualisierung fragt, ob dieses Training zur Person passt. [[1]](quelle-1) [[5]](quelle-5) Ein Marathontraining kann sehr spezifisch sein, aber trotzdem zu hart oder unpassend für einen bestimmten Athleten."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Faktoren sollten individuell angepasst werden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wichtige Stellschrauben sind Umfang, Intensität, Häufigkeit, Dauer, Pausen, Untergrund, Höhenmeter, Krafttraining, Technikarbeit, Erholungsphasen und Wettkampfspezifik."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie erkenne ich, ob mein Training gut individualisiert ist?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein gutes Zeichen ist, wenn Belastung fordernd, aber verarbeitbar bleibt. [[3]](quelle-3) [[6]](quelle-6) Die Leistung entwickelt sich über Wochen, lockere Einheiten bleiben kontrolliert, harte Einheiten haben Qualität, und Beschwerden nehmen nicht zu."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Rolle spielt HRV bei der Individualisierung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "HRV kann Hinweise auf die Belastung des autonomen Nervensystems geben. [[4]](quelle-4) Sie ist besonders nützlich als Trend über mehrere Tage. Eine niedrige HRV kann ein Signal sein, Belastung zu reduzieren oder eine harte Einheit zu verschieben."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Reicht Körpergefühl als Steuerung aus?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Körpergefühl ist wichtig, aber nicht immer zuverlässig. [[3]](quelle-3) [[6]](quelle-6) Viele Athleten unterschätzen Ermüdung oder überschätzen ihre Tagesform. Besser ist die Kombination aus subjektivem Gefühl, Trainingsdaten, Schlaf, Ruhepuls, HRV und Leistungsentwicklung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bedeutet Individualisierung, dass ich harte Einheiten vermeiden soll?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Individualisierung bedeutet nicht Schonung um jeden Preis. Harte Reize bleiben wichtig, wenn sie zum Ziel passen und verarbeitet werden können. [[6]](quelle-6) Entscheidend ist das richtige Maß zur richtigen Zeit."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie oft sollte ein Trainingsplan angepasst werden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Kleine Anpassungen können wöchentlich oder sogar tagesaktuell sinnvoll sein. [[3]](quelle-3) [[4]](quelle-4) Größere Änderungen sollten anhand von Trends erfolgen, zum Beispiel nach mehreren Wochen stagnierender Leistung, wiederkehrenden Beschwerden oder deutlich veränderter Erholung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist bei Verletzungshistorie besonders wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei früheren Beschwerden sollte die mechanische Belastung vorsichtig gesteigert werden. [[7]](quelle-7) Dazu gehören Laufumfang, Untergrund, Höhenmeter, Tempo, Sprints, Sprünge und Krafttraining. Ziel ist nicht Vermeidung, sondern kontrollierter Aufbau von Belastbarkeit."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Brauchen ältere Athleten grundsätzlich weniger Training?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nicht automatisch. Viele Master-Athleten können sehr leistungsfähig trainieren. [[11]](quelle-11) Häufig brauchen sie aber präzisere Erholungssteuerung, bessere Kraft- und Mobilitätsarbeit, angepasste Ernährung und eine vorsichtigere Progression mechanischer Reize. [[10]](quelle-10) [[12]](quelle-12)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann sollte medizinisch abgeklärt werden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei ungewohnten Brustschmerzen, Atemnot, Schwindel, Herzrhythmusstörungen, wiederkehrenden Schmerzen, längeren Leistungseinbrüchen oder vor dem Einstieg in intensives Training bei bestehenden Risikofaktoren sollte ärztlich oder sportmedizinisch abgeklärt werden. [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der wichtigste Fehler bei Individualisierung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der häufigste Fehler ist, nur den Plan zu individualisieren, aber nicht die Reaktion darauf zu beobachten. Individualisierung ist kein einmaliger Planungsakt, sondern ein fortlaufender Abgleich zwischen Reiz, Erholung und tatsächlicher Anpassung. [[3]](quelle-3)"
                  }
                }
              ]
            }
          ]
        }
