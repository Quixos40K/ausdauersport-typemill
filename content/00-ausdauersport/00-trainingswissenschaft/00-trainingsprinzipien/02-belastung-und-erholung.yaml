    title: 'Belastung und Erholung'
    description: '→ Belastung und Erholung sind zwei Seiten desselben Trainingsprozesses. Die Belastung setzt den Reiz, die Erholung ermöglicht die Anpassung. Fortschritt entsteht nicht durch möglichst viele harte Einheiten, sondern durch ein sinnvolles Verhältnis aus Trainingsstress, Regeneration und erneuter Belastung.'
