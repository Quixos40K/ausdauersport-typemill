              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist ein Trainingsreiz einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Trainingsreiz ist eine Belastung, die den Körper fordert und dadurch eine Anpassung auslösen kann. Der Reiz kann durch Tempo, Dauer, Umfang, Kraft, Gelände, Technik oder die Häufigkeit von Einheiten entstehen. [[1]](quelle-1) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann ist ein Trainingsreiz wirksam?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Trainingsreiz ist wirksam, wenn er stark genug ist, um den Körper aus dem Gleichgewicht zu bringen, aber nicht so stark, dass er die Regeneration überfordert. Entscheidend ist das Verhältnis aus Belastung und Erholung. [[1]](quelle-1) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Muss ein Trainingsreiz immer hart sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Auch lockere Einheiten können sehr wichtige Trainingsreize setzen, besonders für aerobe Basis, Kapillarisierung, Fettstoffwechsel, Bewegungsroutine und Regenerationsfähigkeit. Harte Reize sind nur ein Teil des Trainings. [[4]](quelle-4) [[6]](quelle-6) [[10]](quelle-10)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was passiert, wenn der Trainingsreiz zu schwach ist?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Dann bleibt die Belastung unterhalb der Reizschwelle. Der Körper erhält kaum Anlass, sich anzupassen. Solche Einheiten können trotzdem sinnvoll sein, zum Beispiel zur aktiven Erholung oder zum Erhalt der Bewegungsroutine. [[1]](quelle-1)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was passiert, wenn der Trainingsreiz zu stark ist?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein zu starker Reiz kann die Regenerationsfähigkeit überfordern. Kurzfristig entsteht starke Ermüdung, langfristig können Stagnation, Überlastungsbeschwerden, erhöhte Infektanfälligkeit oder Verletzungen entstehen. [[8]](quelle-8) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum wirkt dieselbe Einheit an verschiedenen Tagen unterschiedlich?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Weil nicht nur die äußere Belastung zählt, sondern auch die innere Belastung. Schlaf, Stress, Ernährung, Hitze, Vorbelastung, Krankheitssymptome und mentale Erschöpfung verändern, wie hart ein Trainingsreiz tatsächlich im Körper ankommt. [[2]](quelle-2) [[3]](quelle-3) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Trainingsreiz und Trainingsbelastung?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Trainingsbelastung beschreibt meist das, was getan wird: Kilometer, Minuten, Watt, Tempo oder Höhenmeter. Der Trainingsreiz beschreibt die biologische Wirkung dieser Belastung auf den Körper. [[2]](quelle-2)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Trainingsreize gibt es im Ausdauertraining?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Typische Reize sind aerobe Dauerbelastung, Schwellentraining, hochintensive Intervalle, lange Läufe, Bergläufe, Sprints, Krafttraining, Techniktraining und koordinative Reize. Jeder Reiz spricht andere Systeme an. [[4]](quelle-4) [[5]](quelle-5) [[6]](quelle-6) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum sind Pausen für Trainingsreize wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Pausen ermöglichen die Verarbeitung des Reizes. Ohne ausreichende Erholung bleibt der Körper in Ermüdung, und aus einem eigentlich sinnvollen Trainingsreiz kann eine Überlastung werden. [[1]](quelle-1) [[8]](quelle-8) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie erkenne ich, ob ein Trainingsreiz gut dosiert war?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein gut dosierter Reiz führt zu spürbarer, aber kontrollierbarer Ermüdung. Die Folgetage bleiben planbar, die Leistung stabilisiert sich oder verbessert sich, und Beschwerden klingen ab statt zuzunehmen. [[3]](quelle-3) [[8]](quelle-8) ----"
                  }
                }
              ]
            }
          ]
