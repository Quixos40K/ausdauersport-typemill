    description: 'Ein Makrozyklus ist der langfristige Trainingsabschnitt, der ein größeres Ziel vorbereitet. Im Ausdauertraining umfasst er häufig mehrere Monate bis zu einer ganzen Saison. Er verbindet Grundlagenaufbau, spezifische Vorbereitung, Wettkampfphase und Erholung zu einer geplanten Gesamtstruktur.'
