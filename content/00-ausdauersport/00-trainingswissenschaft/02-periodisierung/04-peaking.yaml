    title: Peaking
    description: "Peaking beschreibt den Zustand, in dem ein Athlet seine bestmögliche Leistungsfähigkeit zu einem bestimmten Zeitpunkt abrufen kann. Im Ausdauertraining entsteht Peaking durch langfristigen Trainingsaufbau, passende Spezifität, kontrollierte Entlastung, ausreichende Erholung und ein gutes Tapering vor dem Hauptwettkampf.\n"
