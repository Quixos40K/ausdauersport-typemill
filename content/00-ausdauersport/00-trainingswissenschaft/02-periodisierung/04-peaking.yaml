                "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/periodisierung/peaking/#webpage"
              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist Peaking einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Peaking bedeutet, die bestmögliche Leistungsfähigkeit zu einem bestimmten Zeitpunkt abrufen zu können. Im Sport ist damit meist der Hauptwettkampf gemeint."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Peaking und Tapering?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Tapering ist der Entlastungsprozess vor dem Wettkampf. Peaking ist der gewünschte Zustand, in dem die Form am Wettkampftag besonders gut abrufbar ist."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann man dauerhaft in Peakform sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Peakform ist zeitlich begrenzt. Wer versucht, dauerhaft in Bestform zu bleiben, riskiert Restermüdung, Stagnation, mentale Ermüdung oder Überlastung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie entsteht ein Peak?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Peak entsteht durch langfristigen Trainingsaufbau, passende Spezifität, geplante Entlastung, gutes Tapering, Erholung, stabile Gesundheit und mentale Frische."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie lange hält ein Peak an?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das ist individuell unterschiedlich. Ein Peak kann wenige Tage bis einige Wochen nutzbar sein. Je gezielter ein Hauptwettkampf vorbereitet wird, desto präziser kann der Peak gesetzt werden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann man mehrere Peaks pro Saison planen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, aber nur begrenzt. Jeder Peak braucht Aufbau, Zuspitzung und Erholung. Zu viele Hauptziele machen die Saison schwer steuerbar."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist ein Hauptwettkampf?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Hauptwettkampf ist der wichtigste Wettkampf eines Trainingsblocks oder einer Saison. Auf ihn wird die Periodisierung besonders ausgerichtet."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Muss jeder Wettkampf mit Peaking vorbereitet werden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Viele Wettkämpfe können als Trainingswettkampf oder Vorbereitungswettkampf genutzt werden. Nicht jeder Start braucht vollständiges Peaking."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was stört Peaking am häufigsten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Häufige Störfaktoren sind zu spätes Reduzieren der Belastung, zu viel Restermüdung, schlechter Schlaf, Stress, Krankheit, neue Beschwerden oder Experimente kurz vor dem Wettkampf."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum fühle ich mich in der Peakphase nicht immer gut?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Während der Entlastung kann sich der Körper ungewohnt anfühlen. Manche Athleten werden nervös, träge oder unruhig. Das bedeutet nicht automatisch, dass der Peak misslingt."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie erkenne ich, ob Peaking funktioniert?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Hinweise sind bessere Frische, stabile Motivation, gute Reaktion auf kurze Aktivierungen, weniger schwere Beine, kein neues Beschwerdebild und ein vertrautes Gefühl für das Wettkampftempo."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was bedeutet Peaking im Marathontraining?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Im Marathontraining bedeutet Peaking, dass lange Läufe, Marathonpace, Energieversorgung und muskuläre Belastbarkeit vorbereitet sind, während die Ermüdung durch Tapering reduziert wurde."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was bedeutet Peaking bei kurzen Distanzen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Bei kurzen Distanzen stehen Frische, Reaktivität, Laufökonomie und Renntempo im Vordergrund. Der Umfang wird reduziert, kurze schnelle Reize können aber erhalten bleiben."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler beim Peaking?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der häufigste Fehler ist, kurz vor dem Wettkampf noch Form erzwingen zu wollen. In der Peakphase geht es nicht mehr um maximalen Aufbau, sondern um Abrufbarkeit. ----"
                  }
                }
              ]
            }
          ]
