    title: Tapering
    description: 'Tapering ist die geplante Reduktion der Trainingsbelastung vor einem wichtigen Wettkampf. Ziel ist es, angesammelte Ermüdung abzubauen, ohne die zuvor aufgebaute Leistungsfähigkeit zu verlieren. Ein gutes Tapering macht nicht fitter durch neues Training, sondern macht die vorhandene Form am Wettkampftag besser abrufbar.'
