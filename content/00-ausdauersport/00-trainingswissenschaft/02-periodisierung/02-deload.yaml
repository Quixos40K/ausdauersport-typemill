    title: Deload
    description: 'Ein Deload ist eine geplante Entlastungsphase im Training. Dabei werden Umfang, Intensität oder Trainingsdichte vorübergehend reduziert, damit Ermüdung abgebaut und Anpassung ermöglicht wird. Ein Deload ist kein Trainingsausfall, sondern ein bewusst eingesetztes Werkzeug der Periodisierung.'
