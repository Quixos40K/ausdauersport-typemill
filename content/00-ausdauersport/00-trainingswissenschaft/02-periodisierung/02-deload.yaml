              "@type": "FAQPage",
              "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/periodisierung/deload/#faq",
              "isPartOf": {
                "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/periodisierung/deload/#webpage"
              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was ist ein Deload einfach erklärt?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Deload ist eine geplante Entlastungsphase im Training. Umfang, Intensität oder Trainingsdichte werden vorübergehend reduziert, damit Ermüdung abgebaut und Anpassung ermöglicht wird. [[1]](quelle-1) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie lange dauert ein Deload?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Deload dauert häufig etwa eine Woche. Je nach Trainingsstand, Belastung, Erholung und Ziel kann er aber auch kürzer oder länger sein. [[1]](quelle-1) [[3]](quelle-3)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Bedeutet Deload komplette Pause?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. Ein Deload bedeutet meistens nicht komplette Pause, sondern reduziertes Training. Es wird weiter trainiert, aber leichter, kürzer oder mit mehr Erholung. [[6]](quelle-6) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wann sollte ich einen Deload einplanen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Deload ist sinnvoll nach mehreren belastenden Trainingswochen, nach intensiven Blöcken, bei steigender Restermüdung oder wenn Warnsignale wie schlechter Schlaf, schwere Beine, Leistungseinbruch oder beginnende Beschwerden auftreten. [[3]](quelle-3) [[4]](quelle-4) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie stark sollte ich im Deload reduzieren?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Häufig wird der Umfang um etwa 20 bis 50 Prozent reduziert. Die genaue Reduktion hängt davon ab, wie stark die vorherige Belastung war und wie gut der Körper regeneriert. [[6]](quelle-6) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Soll ich im Deload Intensität behalten?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt vom Ziel ab. Manchmal bleiben kurze, lockere Aktivierungen erhalten. Harte Intervalle, lange Tempobelastungen oder stark ermüdende Einheiten werden meistens reduziert oder gestrichen. [[3]](quelle-3) [[6]](quelle-6)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Verliere ich durch einen Deload Fitness?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein sinnvoll geplanter Deload führt normalerweise nicht zu Formverlust. Er hilft oft sogar, vorhandene Leistungsfähigkeit wieder sichtbar zu machen, weil Ermüdung abgebaut wird. [[6]](quelle-6) [[7]](quelle-7) [[8]](quelle-8)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Deload und Tapering?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Deload entlastet innerhalb des Trainingsprozesses und bereitet den nächsten Trainingsblock vor. Tapering findet vor einem Wettkampf statt und soll die Leistungsfähigkeit am Starttag maximieren. [[1]](quelle-1) [[6]](quelle-6) [[7]](quelle-7)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Deload und Ruhetag?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein Ruhetag ist ein einzelner Tag ohne Training oder mit sehr leichter Bewegung. Ein Deload ist eine geplante Entlastungsphase über mehrere Tage oder eine ganze Woche. [[1]](quelle-1)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Brauchen Einsteiger einen Deload?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja, oft sogar besonders. Einsteiger bauen Belastbarkeit noch auf und reagieren häufig sensibel auf Umfangssteigerungen. Deloads helfen, Überlastung zu vermeiden. [[3]](quelle-3) [[5]](quelle-5)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Brauchen erfahrene Athleten einen Deload?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Erfahrene Athleten können oft mehr Belastung tolerieren, sammeln aber ebenfalls Ermüdung. Deloads helfen, Trainingsqualität langfristig zu erhalten. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Woran erkenne ich, dass ein Deload funktioniert hat?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nach einem Deload sollten sich lockere Einheiten leichter anfühlen, die Motivation steigen, Schlaf und Erholung stabiler werden und Beschwerden oder schwere Beine abnehmen. [[3]](quelle-3) [[4]](quelle-4) [[9]](quelle-9)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler beim Deload?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der häufigste Fehler ist, die Entlastung nicht ernst zu nehmen. Wenn im Deload weiterhin zu viel mittelhart oder intensiv trainiert wird, kann die Ermüdung nicht ausreichend abgebaut werden. [[3]](quelle-3) [[4]](quelle-4)"
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann ein Deload auch mental helfen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Ein Deload kann mentale Erholung fördern, Trainingsdruck senken und neue Motivation für den nächsten Trainingsblock schaffen. [[4]](quelle-4) [[9]](quelle-9) ----"
                  }
                }
              ]
            }
          ]
        }
