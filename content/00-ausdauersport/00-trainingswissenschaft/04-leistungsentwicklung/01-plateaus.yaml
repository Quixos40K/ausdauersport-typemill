    title: Plateaus
    description: 'Ein Plateau beschreibt eine Phase, in der sich die Leistung trotz regelmäßigem Training kaum weiterentwickelt. Im Ausdauertraining kann das durch monotone Reize, zu wenig Erholung, zu schnelle Belastungssteigerung, fehlende Spezifität, zu viel mittlere Intensität, Alltagsstress oder unpassende Trainingssteuerung entstehen.'
