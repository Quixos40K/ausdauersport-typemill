              "@type": "FAQPage",
              "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/leistungsentwicklung/leistungsdiagnostik-im-verlauf/#faq",
              "isPartOf": {
                "@id": "https://oliver-nix.de/ausdauersport/trainingswissenschaft/leistungsentwicklung/leistungsdiagnostik-im-verlauf/#webpage"
              },
              "mainEntity": [
                {
                  "@type": "Question",
                  "name": "Was bedeutet Leistungsdiagnostik im Verlauf?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Leistungsdiagnostik im Verlauf bedeutet, Leistungswerte nicht nur einmalig zu messen, sondern wiederholt über Wochen oder Monate zu vergleichen. Dadurch wird sichtbar, ob Training wirkt und ob Trainingsbereiche angepasst werden sollten."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum ist der Verlauf wichtiger als ein einzelner Test?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ein einzelner Test ist nur eine Momentaufnahme. Der Verlauf zeigt, ob sich Leistung, Schwellen, Herzfrequenz, Pace, Watt oder Belastungsempfinden über längere Zeit stabil verändern."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Welche Werte sind für den Verlauf wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wichtige Werte sind Pace, Herzfrequenz, Watt, Laktat, VO2max, Schwellen, subjektives Belastungsempfinden, Erholung und Stabilität der Leistung unter Ermüdung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie oft sollte Leistungsdiagnostik durchgeführt werden?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Das hängt vom Trainingsziel ab. Größere Tests sind oft alle paar Monate sinnvoll. Kleinere Verlaufskontrollen können häufiger stattfinden, wenn sie standardisiert und nicht zu belastend sind."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der Unterschied zwischen Labordiagnostik und Felddiagnostik?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Labordiagnostik findet unter kontrollierten Bedingungen statt, zum Beispiel mit Spiroergometrie oder Laktatstufentest. Felddiagnostik findet in der Praxis statt, zum Beispiel auf einer bekannten Strecke oder im Training."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum müssen Tests standardisiert sein?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nur vergleichbare Tests liefern aussagekräftige Verläufe. Strecke, Tageszeit, Vorbelastung, Wetter, Ernährung, Messgeräte und Testprotokoll sollten möglichst ähnlich sein."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was zeigt eine niedrigere Herzfrequenz bei gleicher Pace?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Wenn die Bedingungen vergleichbar sind, kann eine niedrigere Herzfrequenz bei gleicher Pace auf verbesserte aerobe Effizienz hinweisen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was zeigt eine höhere Pace bei gleicher Herzfrequenz?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Eine höhere Pace bei gleicher Herzfrequenz kann bedeuten, dass bei ähnlicher innerer Belastung mehr äußere Leistung möglich ist."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Warum sind Schwellenwerte wichtig?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Schwellen helfen, Trainingsintensitäten individuell einzuordnen. Wenn sich Schwellen verbessern, kann ein Athlet höhere Intensitäten länger kontrolliert halten."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Reicht VO2max zur Beurteilung der Leistung aus?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Nein. VO2max ist wichtig, aber nicht allein entscheidend. Auch Schwellenleistung, Bewegungsökonomie, Ermüdungsresistenz, Pacing und spezifische Belastbarkeit beeinflussen die Ausdauerleistung."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Kann Leistungsdiagnostik Plateaus erkennen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Ja. Wenn sich relevante Werte über längere Zeit nicht verbessern oder sogar verschlechtern, kann das auf ein Plateau, zu wenig Reiz, zu viel Ermüdung oder unpassende Trainingssteuerung hinweisen."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Sollte man kurz vor einem Wettkampf testen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Große Tests kurz vor einem Wettkampf können zusätzliche Ermüdung erzeugen. In der unmittelbaren Wettkampfphase sind kurze, kontrollierte Standortbestimmungen meist sinnvoller."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Was ist der häufigste Fehler bei Leistungsdiagnostik?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Der häufigste Fehler ist, einzelne Werte zu überbewerten. Entscheidend ist der Verlauf über Zeit und die Einordnung zusammen mit Training, Erholung und subjektivem Empfinden."
                  }
                },
                {
                  "@type": "Question",
                  "name": "Wie hängen Leistungsdiagnostik und Monitoring zusammen?",
                  "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Leistungsdiagnostik liefert gezielte Standortbestimmungen. Monitoring begleitet die tägliche oder wöchentliche Reaktion auf Training, Erholung und Alltag. Zusammen ergeben sie ein besseres Bild. ----"
                  }
                }
              ]
            }
          ]
